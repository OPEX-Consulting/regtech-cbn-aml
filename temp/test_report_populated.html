<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBN AML Gap Assessment Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── Reset & Base ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0D1F3C;
    --navy-mid:   #1A3560;
    --navy-light: #2A4A7F;
    --teal:       #0F6E56;
    --teal-mid:   #1D9E75;
    --teal-light: #E1F5EE;
    --amber:      #B06200;
    --amber-bg:   #FDF3E3;
    --red:        #A32D2D;
    --red-bg:     #FCEBEB;
    --orange:     #C85000;
    --orange-bg:  #FEF0E6;
    --slate:      #3D4F6B;
    --muted:      #6B7A94;
    --border:     #D8DFE9;
    --border-light: #EDF0F5;
    --bg:         #F7F9FC;
    --white:      #FFFFFF;
    --text:       #0D1F3C;
    --text-sec:   #3D4F6B;

    --gap-critical-bg:   #FCEBEB;
    --gap-critical-text: #7A1F1F;
    --gap-critical-border: #E07070;
    --gap-identified-bg:   #FDF3E3;
    --gap-identified-text: #6B3A00;
    --gap-identified-border: #D4943A;
    --compliant-bg:   #E1F5EE;
    --compliant-text: #085041;
    --compliant-border: #3BAB82;

    --font-display: 'EB Garamond', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;

    --page-max: 900px;
    --section-gap: 56px;
  }

  html { font-size: 15px; }

  body {
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    line-height: 1.6;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ─── Print ─────────────────────────────────────── */
  @media print {
    body { background: white; font-size: 11pt; }
    .no-print { display: none !important; }
    .page-break { page-break-before: always; }
    .avoid-break { page-break-inside: avoid; }
    .report-cover { page-break-after: always; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
  }

  /* ─── Layout ─────────────────────────────────────── */
  .report-wrapper {
    max-width: var(--page-max);
    margin: 0 auto;
    background: var(--white);
    box-shadow: 0 0 40px rgba(13,31,60,0.08);
  }

  .report-cover {
    background: var(--navy);
    padding: 72px 72px 64px;
    position: relative;
    overflow: hidden;
    min-height: 480px;
    display: flex;
    flex-direction: column;
  }

  .report-cover::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 500px; height: 500px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .report-cover::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 340px; height: 340px;
    border-radius: 50%;
    border: 1px solid rgba(29,158,117,0.15);
  }

  .cover-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: auto;
    padding-bottom: 48px;
  }
  .cover-brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal-mid);
  }
  .cover-brand-name {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .cover-eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-mid);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .cover-title {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 500;
    color: #FFFFFF;
    line-height: 1.15;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }

  .cover-subtitle {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.55);
    margin-bottom: 40px;
  }

  .cover-prepared {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .cover-institution {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 4px;
  }

  .cover-inst-type {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }

  .cover-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }
  .cover-meta-cell {
    background: rgba(255,255,255,0.04);
    padding: 16px 20px;
  }
  .cover-meta-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }
  .cover-meta-value {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    color: #FFFFFF;
  }

  /* ─── Overall Rating Banner ─────────────────────── */
  .rating-banner {
    padding: 32px 72px;
    display: flex;
    align-items: center;
    gap: 24px;
    border-bottom: 1px solid var(--border-light);
  }
  .rating-banner.critical { background: var(--red-bg); border-left: 5px solid var(--red); }
  .rating-banner.high     { background: var(--orange-bg); border-left: 5px solid var(--orange); }
  .rating-banner.medium   { background: var(--amber-bg); border-left: 5px solid var(--amber); }
  .rating-banner.low      { background: var(--teal-light); border-left: 5px solid var(--teal); }

  .rating-banner-left { flex: 1; }
  .rating-banner-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .rating-banner-value {
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
  }
  .rating-banner.critical .rating-banner-value { color: var(--red); }
  .rating-banner.high     .rating-banner-value { color: var(--orange); }
  .rating-banner.medium   .rating-banner-value { color: var(--amber); }
  .rating-banner.low      .rating-banner-value { color: var(--teal); }

  .rating-banner-note {
    font-size: 13px;
    font-style: italic;
    color: var(--text-sec);
  }

  /* ─── Report Body ─────────────────────────────────── */
  .report-body { padding: 0 72px; }

  .report-section {
    padding-top: var(--section-gap);
    padding-bottom: var(--section-gap);
    border-bottom: 1px solid var(--border-light);
  }
  .report-section:last-child { border-bottom: none; }

  .section-heading {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--navy);
    letter-spacing: -0.01em;
  }

  .subsection-heading {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--navy-mid);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .subsection-heading:first-child { margin-top: 0; }

  /* ─── Tables (shared) ─────────────────────────────── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  .data-table th {
    background: var(--navy);
    color: #FFFFFF;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 11px 14px;
    text-align: left;
    border: none;
  }
  .data-table td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: top;
    color: var(--text);
    line-height: 1.55;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:nth-child(even) td { background: #FAFBFD; }
  .data-table .bold { font-weight: 600; }
  .data-table .field-label { font-weight: 600; color: var(--navy-mid); width: 38%; }

  /* ─── Section 1: Institution Profile ─────────────── */
  .profile-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .profile-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 13.5px;
    vertical-align: top;
  }
  .profile-table tr:nth-child(even) td { background: #FAFBFD; }
  .profile-table .field { font-weight: 600; color: var(--navy-mid); width: 38%; }
  .profile-table .deadline-val { font-weight: 700; color: var(--navy); }

  /* ─── Rating Callout Box ──────────────────────────── */
  .rating-callout {
    border-radius: 6px;
    padding: 24px 28px;
    margin-bottom: 28px;
  }
  .rating-callout.critical { background: var(--red-bg); border: 1px solid #E5B0B0; border-left: 4px solid var(--red); }
  .rating-callout.high     { background: var(--orange-bg); border: 1px solid #F0C8A0; border-left: 4px solid var(--orange); }
  .rating-callout.medium   { background: var(--amber-bg); border: 1px solid #E8C882; border-left: 4px solid var(--amber); }
  .rating-callout.low      { background: var(--teal-light); border: 1px solid #9FD4BC; border-left: 4px solid var(--teal); }

  .rating-callout-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .rating-callout.critical .rating-callout-title { color: var(--red); }
  .rating-callout.high     .rating-callout-title { color: var(--orange); }
  .rating-callout.medium   .rating-callout-title { color: var(--amber); }
  .rating-callout.low      .rating-callout-title { color: var(--teal); }

  .rating-callout-body {
    font-size: 13.5px;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.65;
  }
  .rating-callout-note {
    font-size: 13px;
    font-style: italic;
    color: var(--text-sec);
    line-height: 1.6;
  }

  /* ─── Scorecard Table ─────────────────────────────── */
  .scorecard-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .scorecard-table th {
    background: var(--navy);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 10px 14px;
    text-align: left;
  }
  .scorecard-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
    vertical-align: middle;
  }
  .scorecard-table tr:nth-child(even) td { background: #FAFBFD; }
  .scorecard-table .sc-label { color: var(--text-sec); }
  .scorecard-table .sc-score { font-weight: 700; color: var(--navy); }
  .scorecard-table .sc-rating { text-align: right; }

  /* ─── Status Badges ───────────────────────────────── */
  .badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .badge-critical   { background: var(--gap-critical-bg);    color: var(--gap-critical-text);   border: 1px solid var(--gap-critical-border); }
  .badge-gap        { background: var(--gap-identified-bg);  color: var(--gap-identified-text); border: 1px solid var(--gap-identified-border); }
  .badge-compliant  { background: var(--compliant-bg);       color: var(--compliant-text);      border: 1px solid var(--compliant-border); }
  .badge-high       { background: var(--orange-bg);          color: var(--orange);              border: 1px solid #F0C8A0; }
  .badge-elevated   { background: var(--amber-bg);           color: var(--amber);               border: 1px solid #E8C882; }
  .badge-inplace    { background: var(--compliant-bg);       color: var(--compliant-text);      border: 1px solid var(--compliant-border); }
  .badge-notconf    { background: #F3F5F9;                   color: var(--muted);               border: 1px solid var(--border); }
  .badge-notinplace { background: var(--gap-critical-bg);    color: var(--gap-critical-text);   border: 1px solid var(--gap-critical-border); }

  /* ─── Info Box (Regulatory Context) ──────────────── */
  .info-box {
    background: #EEF2FB;
    border: 1px solid #BCC8E3;
    border-left: 4px solid var(--navy-mid);
    border-radius: 5px;
    padding: 18px 22px;
    font-size: 13px;
    color: var(--text-sec);
    line-height: 1.65;
    margin-top: 20px;
  }
  .info-box strong {
    display: block;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ─── Section 2: Gap Analysis Table ──────────────── */
  .gap-table { width: 100%; border-collapse: collapse; }
  .gap-table th {
    background: var(--navy);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 11px 14px;
    text-align: left;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .gap-table th:last-child { border-right: none; }
  .gap-table td {
    padding: 14px 14px;
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
    vertical-align: top;
    font-size: 13px;
    line-height: 1.6;
  }
  .gap-table td:last-child { border-right: none; }
  .gap-table tr:nth-child(even) td { background: #FAFBFD; }
  .gap-table tr.row-critical td { border-left: 3px solid var(--red); }
  .gap-table tr.row-gap td      { border-left: 3px solid var(--amber); }
  .gap-table tr.row-compliant td { border-left: 3px solid var(--teal); }

  .gap-section-ref { font-weight: 700; color: var(--navy); white-space: nowrap; font-size: 13px; }
  .gap-std-title   { font-weight: 600; color: var(--navy-mid); font-size: 12.5px; }
  .gap-finding     { color: var(--text); font-size: 13px; }
  .gap-action      { color: var(--text-sec); font-size: 12.5px; }

  /* ─── Section 2.1: Governance Table ──────────────── */
  .gov-table { width: 100%; border-collapse: collapse; }
  .gov-table th {
    background: var(--navy);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 10px 14px;
    text-align: left;
  }
  .gov-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
    vertical-align: middle;
  }
  .gov-table tr:nth-child(even) td { background: #FAFBFD; }
  .gov-table .gov-total td {
    background: var(--navy) !important;
    color: #FFFFFF;
    font-weight: 700;
    font-size: 13px;
  }

  /* ─── Section 3: Priority Actions ────────────────── */
  .priority-box {
    border: 1px solid var(--border);
    border-left: 4px solid var(--navy-mid);
    border-radius: 5px;
    padding: 22px 26px;
    margin-bottom: 16px;
    background: var(--white);
  }
  .priority-box:last-child { margin-bottom: 0; }

  .priority-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
  }
  .priority-number {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    min-width: 32px;
    border-radius: 50%;
    background: var(--navy);
    color: #FFFFFF;
    font-weight: 700;
    font-size: 14px;
    font-family: var(--font-body);
    margin-top: 2px;
  }
  .priority-titles { flex: 1; }
  .priority-title {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .priority-deadline {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .priority-body {
    font-size: 13.5px;
    color: var(--text-sec);
    line-height: 1.65;
    padding-left: 48px;
  }

  /* ─── Section 4: Roadmap Table ────────────────────── */
  .roadmap-table { width: 100%; border-collapse: collapse; }
  .roadmap-table th {
    background: var(--navy);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 11px 14px;
    text-align: left;
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .roadmap-table th:last-child { border-right: none; }
  .roadmap-table td {
    padding: 16px 14px;
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
    vertical-align: top;
    font-size: 13px;
    line-height: 1.6;
  }
  .roadmap-table td:last-child { border-right: none; }
  .roadmap-phase-header {
    font-weight: 700;
    color: var(--navy);
    font-size: 13px;
    display: block;
    margin-bottom: 3px;
  }
  .roadmap-phase-timeline {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--teal);
    display: block;
    margin-top: 2px;
  }
  .roadmap-table tr:nth-child(4n+2) td { background: #FAFBFD; }

  /* ─── Section 5: Support Section ─────────────────── */
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .product-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    background: var(--white);
  }
  .product-card-name {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .product-card-function {
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .product-card-standards {
    font-size: 11px;
    font-weight: 600;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .product-card-relevance {
    font-size: 13px;
    color: var(--text-sec);
    line-height: 1.6;
    border-top: 1px solid var(--border-light);
    padding-top: 10px;
    margin-top: 10px;
  }

  .advisory-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .advisory-list li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text-sec);
    line-height: 1.5;
  }
  .advisory-list li::before {
    content: '→';
    color: var(--teal-mid);
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .next-steps-box {
    background: var(--navy);
    border-radius: 6px;
    padding: 24px 28px;
    color: rgba(255,255,255,0.9);
    font-size: 13.5px;
    line-height: 1.65;
  }
  .next-steps-box strong {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 10px;
  }
  .next-steps-email {
    display: inline-block;
    margin-top: 10px;
    font-weight: 600;
    color: var(--teal-mid);
    font-size: 13px;
  }

  /* ─── Disclaimer ──────────────────────────────────── */
  .report-disclaimer {
    padding: 32px 72px;
    border-top: 1px solid var(--border-light);
    background: #F7F9FC;
  }
  .disclaimer-text {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.7;
  }
  .disclaimer-text strong {
    font-style: normal;
    color: var(--text-sec);
    display: block;
    margin-bottom: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ─── Report Footer ───────────────────────────────── */
  .report-footer {
    background: var(--navy);
    padding: 20px 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-brand {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .footer-ref {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
  }

<script>
/* ══════════════════════════════════════════════════════
   UTILITY HELPERS
══════════════════════════════════════════════════════ */
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function statusBadge(status) {
  const s = String(status).toLowerCase();
  if (s === 'critical gap' || s === 'critical')   return `<span class="badge badge-critical">Critical Gap</span>`;
  if (s === 'gap identified')                      return `<span class="badge badge-gap">Gap Identified</span>`;
  if (s === 'compliant')                           return `<span class="badge badge-compliant">Compliant</span>`;
  if (s === 'high')                                return `<span class="badge badge-high">High</span>`;
  if (s === 'elevated')                            return `<span class="badge badge-elevated">Elevated</span>`;
  if (s === 'standard')                            return `<span class="badge badge-compliant">Standard</span>`;
  if (s === 'in place')                            return `<span class="badge badge-inplace">In Place</span>`;
  if (s === 'not confirmed')                       return `<span class="badge badge-notconf">Not Confirmed</span>`;
  if (s === 'not in place')                        return `<span class="badge badge-notinplace">Not In Place</span>`;
  if (s === 'weak' || s === 'partial')             return `<span class="badge badge-gap">${esc(status)}</span>`;
  if (s === 'adequate' || s === 'strong')          return `<span class="badge badge-compliant">${esc(status)}</span>`;
  return `<span class="badge badge-notconf">${esc(status)}</span>`;
}

function ratingClass(rating) {
  const r = String(rating).toLowerCase();
  if (r === 'critical') return 'critical';
  if (r === 'high')     return 'high';
  if (r === 'medium')   return 'medium';
  if (r === 'low')      return 'low';
  return 'critical';
}

function gapRowClass(status) {
  const s = String(status).toLowerCase();
  if (s === 'critical gap') return 'row-critical';
  if (s === 'gap identified') return 'row-gap';
  if (s === 'compliant') return 'row-compliant';
  return '';
}

        <tr>
          <td class="sc-label">Risk Factors Identified</td>
          <td class="sc-score">${esc(sc.risk_factors_label)}</td>
          <td class="sc-rating">${statusBadge(sc.risk_factors_rating)}</td>
        </tr>
      </tbody>
    </table>
    <div class="info-box">
      <strong>Regulatory Context</strong>
      ${esc(sc.regulatory_context_box)}
    </div>
  </div>`;
}

  const standards = (r.standards || []).map(s => `

/* ══════════════════════════════════════════════════════
   MAIN RENDER FUNCTION
   Call this with the parsed JSON object from the AI API
══════════════════════════════════════════════════════ */
function renderReport(reportData) {
  const r = reportData;

  // Inject passthrough meta fields from input JSON if present
  // (allows the caller to forward cbn_risk, tx_vol, geo from form data
  //  into the meta block even if the AI didn't echo them back)
  if (r._input) {
    r.meta.cbn_risk = r.meta.cbn_risk || r._input.cbn_risk || '—';
    r.meta.tx_vol   = r.meta.tx_vol   || txVolLabel(r._input.tx_vol);
    r.meta.geo      = r.meta.geo      || r._input.geo || '—';
  }

  const html = `
    <div class="report-wrapper">
      ${buildCover(r)}
      <div class="report-body">
        ${buildSection1(r)}
        ${buildSection2(r)}
        ${buildSection3(r)}
        ${buildSection4(r)}
        ${buildSection5(r)}
      </div>
      ${buildFooter(r)}
    </div>`;

  document.getElementById('report-root').innerHTML = html;
}

/* ══════════════════════════════════════════════════════
   HELPER: TRANSLATE FORM VALUES TO DISPLAY LABELS
══════════════════════════════════════════════════════ */
function txVolLabel(v) {
  const map = {
    '<1K': 'Under 1,000 transactions per day',
    '1K-50K': '1,000 – 50,000 transactions per day',
    '50K-500K': '50,000 – 500,000 transactions per day',
    '>500K': 'Over 500,000 transactions per day'
  };
  return map[v] || v || '—';
}
