<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBN AML Gap Assessment Report | OPEX Consulting & RegTech365</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0B1D35;
  --navy-mid: #132642;
  --navy-light: #1C3560;
  --gold: #C9A84C;
  --gold-light: #E2C06A;
  --gold-pale: #F6EDD3;
  --white: #FDFCF9;
  --off-white: #F4F1EA;
  --ink: #1A1A2E;
  --muted: #7A8FA8;
  --border: rgba(201,168,76,0.18);
  --border-light: rgba(201,168,76,0.1);
  --critical: #C0392B;
  --critical-bg: #FDF0EE;
  --critical-border: rgba(192,57,43,0.2);
  --high: #D35400;
  --high-bg: #FEF5EE;
  --high-border: rgba(211,84,0,0.2);
  --medium: #D4AC0D;
  --medium-bg: #FEFDF0;
  --medium-border: rgba(212,172,13,0.25);
  --good: #1E8449;
  --good-bg: #EEF7F1;
  --good-border: rgba(30,132,73,0.2);
  --mandatory: #8E44AD;
  --mandatory-bg: #F9F0FF;
  --mandatory-border: rgba(142,68,173,0.2);
  --conditional: #2471A3;
  --conditional-bg: #EEF4FF;
  --conditional-border: rgba(36,113,163,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.7;
}

/* ── COVER PAGE ── */
.cover {
  background: var(--navy);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  page-break-after: always;
}

.cover::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 80%, rgba(201,168,76,0.05) 0%, transparent 50%),
    repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
  pointer-events:none;
}

.cover-body {
  position:relative;
  z-index:1;
  flex:1;
  display:flex;
  flex-direction:column;
  padding: 56px 64px;
}

.cover-brand {
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:auto;
  padding-bottom:48px;
}

.cover-logo {
  width:44px; height:44px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'DM Sans',sans-serif;
  font-size:18px; font-weight:700;
  color: var(--navy);
}

.cover-brand-text { display:flex; flex-direction:column; }
.cover-brand-name { font-size:12px; font-weight:600; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; }
.cover-brand-sub { font-size:10px; color:var(--muted); letter-spacing:0.06em; margin-top:2px; }

.cover-main { flex:1; display:flex; flex-direction:column; justify-content:center; padding:48px 0; }

.cover-eyebrow {
  font-size:11px;
  font-weight:600;
  color:var(--gold);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:12px;
}

.cover-eyebrow::after {
  content:'';
  height:1px;
  width:60px;
  background:var(--gold);
  opacity:0.4;
}

.cover-title {
  font-family:'DM Sans',sans-serif;
  font-size:clamp(36px,5vw,56px);
  font-weight:700;
  color:var(--white);
  line-height:1.1;
  margin-bottom:12px;
  letter-spacing:-0.03em;
}

.cover-title span { color:var(--gold); }

.cover-subtitle {
  font-size:16px;
  color:rgba(255,255,255,0.5);
  margin-bottom:48px;
  font-weight:300;
}

.cover-meta-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:1px;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:12px;
  overflow:hidden;
  max-width:640px;
}

.cover-meta-cell {
  background:rgba(255,255,255,0.03);
  padding:16px 20px;
}

.cover-meta-label {
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:4px;
}

.cover-meta-value {
  font-size:14px;
  color:var(--white);
  font-weight:500;
}

.cover-meta-value.gold { color:var(--gold); }

/* OVERALL RISK RATING on cover */
.cover-risk {
  margin-top:40px;
  display:inline-flex;
  align-items:center;
  gap:16px;
  border-radius:10px;
  padding:16px 24px;
  max-width:640px;
}

.cover-risk.critical { background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.35); }
.cover-risk.high { background:rgba(211,84,0,0.15); border:1px solid rgba(211,84,0,0.35); }
.cover-risk.medium { background:rgba(212,172,13,0.15); border:1px solid rgba(212,172,13,0.35); }
.cover-risk.low { background:rgba(30,132,73,0.15); border:1px solid rgba(30,132,73,0.35); }

.cover-risk-badge {
  color:white;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:6px 14px;
  border-radius:6px;
  white-space:nowrap;
}
.badge-critical { background:var(--critical); }
.badge-high { background:var(--high); }
.badge-medium { background:var(--medium); }
.badge-low { background:var(--good); }

.cover-risk-text {
  font-size:13px;
  color:rgba(255,255,255,0.65);
  line-height:1.5;
}

.cover-footer {
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:24px 64px 40px;
  border-top:1px solid rgba(201,168,76,0.12);
}

.cover-footer-left { font-size:11px; color:rgba(255,255,255,0.3); line-height:1.6; }
.cover-footer-right { font-size:11px; color:rgba(255,255,255,0.3); text-align:right; }

/* ── LAYOUT ── */
.page { max-width:900px; margin:0 auto; padding:60px 64px; }

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border-light);
}
.page-header-brand { font-size: 10px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
.page-header-doc { font-size: 10px; color: var(--muted); }

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .cover { min-height:100vh; }
  .page { padding:40px 48px; }
  .no-print { display:none !important; }
  .page-break { page-break-before:always; }
}

/* ── TOC ── */
.toc { padding: 60px 64px; background: var(--off-white); border-bottom: 1px solid var(--border); page-break-after: always; }
.toc-title { font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 700; color: var(--navy); margin-bottom: 32px; letter-spacing: -0.02em; }
.toc-item { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); font-size: 14px; color: var(--ink); }
.toc-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold); font-weight: 600; width: 24px; }
.toc-label { flex: 1; color: var(--navy); font-weight: 500; }
.toc-dots { flex: 1; border-bottom: 1px dotted rgba(201,168,76,0.3); margin: 0 8px; position: relative; top: -4px; height: 1px; align-self: center; }
.toc-section { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 30px; text-align: right; }

/* ── SECTION HEADINGS ── */
.section-divider {
  margin: 52px 0 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  break-inside: avoid;
  page-break-inside: avoid;
  break-after: avoid;
  page-break-after: avoid;
}

.section-label-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.section-header-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.section-num-badge {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--navy);
  flex-shrink: 0;
}

.section-heading {
  font-family: 'DM Sans', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.2;
  letter-spacing: -0.02em;
}

/* ── EXECUTIVE SUMMARY ── */
.exec-lead {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.5;
  margin-bottom: 20px;
  padding-left: 20px;
  border-left: 3px solid var(--gold);
  letter-spacing: -0.01em;
}

.exec-body {
  font-size: 14px;
  color: #2C3E50;
  line-height: 1.8;
  margin-bottom: 16px;
}

/* ── SCORECARD ── */
.scorecard {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin:32px 0;
}

.score-cell {
  background:var(--white);
  padding:20px;
  text-align:center;
}

.score-value {
  font-family: 'DM Sans', sans-serif;
  font-size: 32px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.score-label {
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  line-height:1.4;
}

.score-critical { color:var(--critical); }
.score-high { color:var(--high); }
.score-gold { color:var(--gold); }
.score-good { color:var(--good); }
.score-navy { color:var(--navy); }

/* ── TABLES ── */
.profile-table, .gov-table, .milestone-table {
  width: 100%;
  border-collapse: collapse;
  margin: 24px 0;
}

.profile-table tr, .gov-table tr, .milestone-table tr {
  border-bottom: 1px solid var(--border-light);
}

.profile-table td {
  padding: 12px 16px;
  font-size: 13.5px;
}

.profile-table td:first-child {
  width: 38%;
  color: var(--muted);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.gov-table th, .milestone-table th {
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: #FAFAF7;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

.gov-table td, .milestone-table td {
  padding: 14px 16px;
  font-size: 13.5px;
}

/* ── TAGS & BADGES ── */
.req-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  margin-right: 4px;
}

.req-mandatory { background: var(--mandatory-bg); border: 1px solid var(--mandatory-border); color: var(--mandatory); }
.req-conditional { background: var(--conditional-bg); border: 1px solid var(--conditional-border); color: var(--conditional); }
.req-cbn { background: #F0F4F8; border: 1px solid #CBD5E0; color: #4A5568; font-family: 'DM Mono', monospace; }

.status-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 4px; white-space: nowrap;
}
.status-critical { background: var(--critical-bg); border: 1px solid var(--critical-border); color: var(--critical); }
.status-high { background: var(--high-bg); border: 1px solid var(--high-border); color: var(--high); }
.status-gap { background: var(--medium-bg); border: 1px solid var(--medium-border); color: var(--medium); }
.status-compliant { background: var(--good-bg); border: 1px solid var(--good-border); color: var(--good); }

/* ── STANDARDS ── */
.std-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
.std-header {
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px;
  padding: 16px 20px; background: #FAFAF7; border-bottom: 1px solid var(--border-light);
}
.std-ref { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--navy); background: rgba(11,29,53,0.06); border-radius: 5px; padding: 4px 10px; }
.std-name { font-size: 14px; font-weight: 600; color: var(--navy); }
.std-body { padding: 20px; }
.std-finding { font-size: 13.5px; color: #2C3E50; line-height: 1.7; margin-bottom: 16px; padding: 14px 16px; background: #FAFAF7; border-left: 3px solid; border-radius: 0 6px 6px 0; }
.std-finding.critical { border-left-color: var(--critical); }
.std-finding.high { border-left-color: var(--high); }
.std-finding.gap { border-left-color: var(--medium); }
.std-finding.compliant { border-left-color: var(--good); }

.std-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
.std-block-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.std-block-text { font-size: 13px; color: #2C3E50; line-height: 1.6; }

.regtech-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.04));
  border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px;
  font-size: 11px; font-weight: 600; color: var(--gold); margin-top: 8px; margin-right: 6px;
  text-decoration: none; cursor: pointer;
}
.regtech-pill::before { content: '→'; color: var(--gold); }

/* ── ALERTS ── */
.inline-alert { display: flex; gap: 16px; align-items: flex-start; padding: 18px 22px; border-radius: 8px; margin: 24px 0; font-size: 13px; line-height: 1.6; }
.ia-icon { font-size: 18px; margin-top: -2px; }
.ia-critical { background: var(--critical-bg); border: 1px solid var(--critical-border); color: #7A1F1F; }
.ia-warn { background: var(--high-bg); border: 1px solid var(--high-border); color: #6B3A00; }
.ia-info { background: #EEF2FB; border: 1px solid #BCC8E3; color: var(--navy-mid); }

/* ── GOVERNANCE ── */
.score-ring-wrap { display: flex; align-items: center; gap: 32px; margin: 32px 0; background: #FAFAF7; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light); }
.score-ring { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.score-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring-num { font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 600; color: var(--navy); line-height: 1; letter-spacing: -0.02em; }
.score-ring-denom { font-size: 11px; color: var(--muted); margin-top: 2px; }
.score-ring-context { flex: 1; }
.score-ring-context h3 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; letter-spacing: -0.02em; }
.score-ring-context p { font-size: 13px; color: #2C3E50; line-height: 1.6; }

/* ── PRIORITY ACTIONS ── */
.priority-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.priority-header {
  display: flex; align-items: flex-start; gap: 16px; padding: 18px 20px;
  background: linear-gradient(135deg, rgba(11,29,53,0.03), rgba(201,168,76,0.04));
  border-bottom: 1px solid var(--border-light);
}
.priority-num {
  width: 36px; height: 36px; background: var(--navy); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--gold); flex-shrink: 0;
}
.priority-title { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.priority-deadline { font-size: 11px; color: var(--critical); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
.priority-body { padding: 18px 20px; font-size: 13px; color: #2C3E50; line-height: 1.7; }

/* ── ROADMAP ── */
.roadmap-phase { position: relative; padding-left: 32px; margin-bottom: 32px; }
.roadmap-phase::before {
  content: ''; position: absolute; left: 10px; top: 36px; bottom: -16px; width: 1px; background: var(--border);
}
.roadmap-phase:last-child::before { display: none; }
.phase-dot {
  position: absolute; left: 0; top: 6px; width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: 3px solid var(--white); box-shadow: 0 0 0 1px var(--border);
}
.phase-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.phase-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; background: rgba(201,168,76,0.08); border: 1px solid var(--border); border-radius: 4px; padding: 2px 10px; }
.phase-timeline { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.phase-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.phase-body { font-size: 13.5px; color: #2C3E50; line-height: 1.7; margin-bottom: 12px; }
.phase-deliverables { display: flex; flex-wrap: wrap; gap: 6px; }
.deliverable-tag { font-size: 11px; background: #F0F4F8; border: 1px solid #CBD5E0; border-radius: 4px; padding: 3px 10px; color: #4A5568; }
.services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 24px; }
.service-item { display: flex; gap: 12px; margin-bottom: 0 !important; }

/* ── PRODUCT CARDS ── */
.regtech-product-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.regtech-product-header { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); }
.product-icon {
  width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy);
}
.product-name { font-size: 15px; font-weight: 600; color: var(--white); }
.product-name a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 1px; }
.product-tagline { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.regtech-product-body { padding: 18px 20px; }
.gap-closed-tag { font-size: 11px; background: var(--mandatory-bg); border: 1px solid var(--mandatory-border); color: var(--mandatory); border-radius: 4px; padding: 2px 10px; font-family: 'DM Mono', monospace; margin-right: 6px; margin-bottom: 6px; display: inline-block; }
.product-desc { font-size: 13.5px; color: #2C3E50; line-height: 1.7; }

/* ── CTA ── */
.cta-box { background: var(--navy); border-radius: 16px; padding: 40px; text-align: center; margin: 40px 0; position: relative; overflow: hidden; }
.cta-box::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(201,168,76,0.1), transparent); }
.cta-title { font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 700; color: var(--white); margin-bottom: 12px; position: relative; letter-spacing: -0.02em; }
.cta-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto; position: relative; }
.cta-buttons { display: flex; justify-content: center; gap: 16px; position: relative; }
.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px; }
.btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 500; font-size: 13px; }

/* ── FOOTER ── */
.disclaimer { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 20px 0; border-top: 1px solid var(--border-light); margin-top: 40px; }

y drafting, and phased implementation to meet the September 2027 compliance deadline."],"inline_alert":"CBN Circular BSD/DIR/PUB/LAB/019/002 states: 'Manual AML controls are no longer sufficient. All DMBs must deploy automated solutions supporting real-time monitoring, AI/ML anomaly detection, and full integration with core banking systems within 18 months.'"},"overall_rating":{"rating":"CRITICAL","rating_label":"Critical Non-Compliance","sector_context_note":"Johndup operates entirely manual AML processes. Zero governance controls are in place. All 12 CBN Baseline Standards constitute Critical Gaps. Immediate executive intervention required."},"scorecard":{"aml_system_status_label":"Manual processes only","aml_system_status_rating":"Critical Gap","standards_compliant_count":0,"standards_compliant_rating":"Critical Gap","standards_critical_gap_count":12,"standards_critical_gap_rating":"Critical Gap","standards_gap_identified_count":0,"governance_score_label":"0 of 10 controls in place","governance_score_rating":"Critical Gap","internal_audit_label":"AML not covered","internal_audit_rating":"Critical Gap","risk_factors_label":"PEP exposure","risk_factors_rating":"Elevated","regulatory_context_box":"Johndup has seen vendor demos but has not started roadmap preparation. Budget constraints are the primary concern. No recent CBN examination activity reported."},"profile":{"sector_context_box":"As a DMB, Johndup faces the strictest compliance timeline — 18 months to full compliance. Trade finance and PEP exposure elevate sanctions screening requirements under 5.3."},"requirement_categories_intro":"The CBN Baseline Standards apply differentially based on institution type, risk classification, and product profile. Johndup's status as a DMB with PEP exposure triggers all mandatory requirements plus conditional obligations for enhanced sanctions screening and trade finance monitoring.","requirement_categories_alert":"Johndup must address all 12 Baseline Standards. As a DMB, s All institutions must document and enforce SLAs for alert investigation and escalation."},{"area":"Fraud Monitoring and Detection","cbn_ref":"5.6(a)","category":"Mandatory","trigger":"All institutions must deploy real-time fraud monitoring. Johndup currently has no fraud detection capability."},{"area":"Case Management — Enterprise Case Management with audit trails","cbn_ref":"5.7(a)","category":"Mandatory","trigger":"All institutions must implement ECM with Maker-Checker workflows and immutable audit logs."},{"area":"Regulatory Reporting — automated STR/SAR/CTR/FTR generation","cbn_ref":"5.8(a)","category":"Mandatory","trigger":"All institutions must automate regulatory filing. Manual goAML portal submission does not satisfy 5.8 automation requirements."},{"area":"Audit and Governance — immutable audit trails","cbn_ref":"5.9(a)","category":"Mandatory","trigger":"All institutions must maintain tamper-proof logs of all AML system activity for regulatory examination."},{"area":"System Integration and Scalability — prohibition on standalone feeds","cbn_ref":"5.10(d)","category":"Mandatory","trigger":"DMBs are prohibited from using standalone transaction feeds. Full bidirectional integration with core banking is mandatory."},{"area":"Security and Data Protection — encryption and MFA","cbn_ref":"5.11(a)","category":"Mandatory","trigger":"All institutions must implement encryption at rest/transit and enforce MFA. Johndup currently has neither."},{"area":"Security and Data Protection — Business Impact Analysis","cbn_ref":"5.11(c)","category":"Mandatory","trigger":"All institutions must conduct BIA with defined RTO/RPO for AML systems. Johndup has no BIA."},{"area":"User Interface and Customisation — real-time dashboards","cbn_ref":"5.12(a)","category":"Mandatory","trigger":"All institutions must provide real-time AML metrics dashboards for compliance officers and investigators."},{"area":"Board-Approved AML/CFT/CPF Policy","cbn_ref":"Section 6","category":"Mandatory","trigger":"All institutions must maintain board-approved AML policy. Johndup has no documented policy."},{"area":"Vendor and Third-Party Management Policy","cbn_ref":"Section 6","category":"Mandatory","trigger":"All institutions must document vendor management frameworks for AML solution providers."},{"area":"CBN Implementation Roadmap Submission","cbn_ref":"Circular BSD/DIR/PUB/LAB/019/002","category":"Mandatory","trigger":"All institutions must submit 12-section roadmap by June 10, 2026. Incomplete submissions constitute non-compliance."}],"gap_analysis_intro":"Johndup operates entirely manual AML processes across all functional areas. The following analysis maps each of the 12 CBN Baseline Standards to specific gaps, required actions, and RegTech365 solutions. All 12 standards constitute Critical Gaps requiring immediate remediation.","standards":[{"section":"5.1","title":"Integrated AML Solution","status":"Critical Gap","req_tags":[{"label":"Mandatory for all DMBs","type":"mandatory"},{"label":"9 functional areas required","type":"mandatory"}],"finding":"Johndup has no automated AML platform. Standard 5.1(a) requires integrated solutions supporting CDD/KYC, sanctions screening, risk assessment, transaction monitoring, fraud detection, case management, reporting, audit trails, and data protection. Manual processes across all areas constitute non-compliance.","required_action":"Deploy integrated AML platform supporting all 9 functional areas before September 2027 compliance deadline. Initiate vendor selection immediately to allow 18-month implementation runway.","regtech_solution":"RegPort provides the core integrated platform addressing CDD/KYC, sanctions, transaction monitoring, and regulatory reporting with purpose-built NIBSS/goAML integration for Nigerian DMBs.","regtech_products":["RegPort"]},{"section":"5.2","title":"CDD, KYC and KYB","status":"Critical Gap","req_tags":[{"label":"BVN/NIN integration mandatory","type":"mandatory"},{"label":"Real-time verification required","type":"mandatory"}],"finding":"Johndup conducts manual KYC with batch BVN lookups. Standard 5.2(b)(i) mandates real-time identity corroboration via BVN/NIN linkage at account opening and periodic refresh. Manual processes cannot satisfy real-time requirements. UBO mapping is manual, creating trade finance compliance risk.","required_action":"Implement real-time BVN/NIN integration via NIBSS APIs. Automate UBO mapping for corporate accounts. Deploy dynamic KYC refresh triggers based on risk score changes.","regtech_solution":"RegPort integrates directly with NIBSS for real-time BVN/NIN verification, automated UBO mapping, and dynamic KYC refresh workflows triggered by risk score escalation or transaction anomalies.","regtech_products":["RegPort"]},{"section":"5.3","title":"Sanctions and PEP Screening","status":"Critical Gap","req_tags":[{"label":"Real-time screening mandatory","type":"mandatory"},{"label":"Enhanced coverage for PEP exposure","type":"conditional"}],"finding":"Johndup screens manually against CBN/EFCC lists only. Standard 5.3(a)(viii) requires real-time screening with automated transaction interdiction on confirmed matches. PEP exposure triggers enhanced coverage requirements — OFAC, UN, EU, UK HMT lists are mandatory. Fuzzy matching and name variant detection are absent.","required_action":"Deploy real-time sanctions screening with fuzzy matching across domestic and international lists. Implement automated transaction hold on confirmed matches. Expand coverage to OFAC, UN, EU, UK HMT.","regtech_solution":"RegPort delivers real-time AI-driven sanctions screening with fuzzy matching, name variant detection, and automated interdiction. Pre-configured list coverage includes CBN/EFCC, OFAC, UN, EU, UK HMT with daily updates.","regtech_products":["RegPort"]},{"section":"5.4","title":"Customer Risk Assessment","status":"Critical Gap","req_tags":[{"label":"Dynamic scoring required","type":"mandatory"},{"label":"AI governance framework mandatory","type":"mandatory"}],"finding":"Johndup conducts manual risk assessments at onboarding with no dynamic refresh. Standard 5.4(a)(iv) requires automated risk scoring that updates based on transactional behavior, KYC changes, and external triggers. AI/ML models require documented governance framework with human oversight and explainability — currently absent.","required_action":"Implement dynamic risk scoring engine with automated refresh triggers. Establish Model Governance Committee to oversee AI/ML risk models. Document explainability and human oversight protocols.","regtech_solution":"RegPort provides dynamic risk scoring with automated refresh based on transaction patterns, KYC updates, and sanctions hits. RegComply delivers the governance framework for model oversight and audit trail documentation.","regtech_products":["RegPort","RegComply"]},{"section":"5.5","title":"Transaction Monitoring and Risk-Based Analyses","status":"Critical Gap","req_tags":[{"label":"Real-time monitoring mandatory","type":"mandatory"},{"label":"Alert SLA documentation required","type":"mandatory"}],"finding":"Johndup reviews transaction logs manually. Standard 5.5(b)(i) mandates real-time multi-scenario monitoring across all payment channels. Automated alert closure is prohibited unless 4 strict criteria are met: governance approval, KYC/transactional context, low customer risk, no unresolved alerts. Johndup has no documented Alert Review SLAs, violating 5.5(b)(vi).","required_action":"Deploy real-time transaction monitoring with multi-scenario rule engine. Document and enforce Alert Review SLAs. Establish governance-approved criteria for automated low-risk alert closure.","regtech_solution":"RegPort delivers real-time transaction monitoring with configurable scenario library and network analysis. RegComply enforces documented Alert Review SLAs and governance-approved automated closure criteria with full audit trails.","regtech_products":["RegPort","RegComply"]},{"section":"5.6","title":"Fraud Monitoring and Detection","status":"Critical Gap","req_tags":[{"label":"Real-time fraud monitoring mandatory","type":"mandatory"},{"label":"Unified AML-Fraud architecture required","type":"conditional"}],"finding":"Johndup has no fraud monitoring capability. Standard 5.6(a) requires real-time fraud detection across digital channels. As a DMB, Johndup must roadmap toward a Unified Financial Crime Risk Architecture per 5.6(b)(i), where fraud signals feed into AML risk scoring. Current manual processes create regulatory and operational risk.","required_action":"Deploy real-time fraud monitoring across ATM/POS channels. Establish fraud-to-AML risk feed to create unified financial crime architecture. Document roadmap for full integration.","regtech_solution":"RegGuard provides real-time fraud monitoring with behavioral analytics and device fingerprinting. Fraud signals feed directly into RegPort's risk scoring engine, creating the unified architecture required by 5.6(b)(i).","regtech_products":["RegGuard","RegPort"]},{"section":"5.7","title":"Case Management","status":"Critical Gap","req_tags":[{"label":"Enterprise Case Management mandatory","type":"mandatory"},{"label":"Maker-Checker workflows required","type":"mandatory"}],"finding":"Johndup manages alerts and investigations manually with informal approval processes. Standard 5.7(a) requires Enterprise Case Management with Maker-Checker workflows, immutable audit trails, and structured investigation documentation. Manual case files cannot satisfy examination requirements for tamper-proof evidence chains.","required_action":"Implement ECM with Maker-Checker workflows for alert escalation, investigation, and STR filing. Ensure immutable audit trails for all case activity.","regtech_solution":"RegComply delivers Enterprise Case Management with enforced Maker-Checker workflows, immutable audit logs, and structured investigation templates. All case activity is timestamped and tamper-proof for CBN examination.","regtech_products":["RegComply"]},{"section":"5.8","title":"Regulatory Reporting","status":"Critical Gap","req_tags":[{"label":"Automated STR/SAR/CTR/FTR generation mandatory","type":"mandatory"}],"finding":"Johndup files STRs manually via goAML portal with informal approval. Standard 5.8(a) requires automated generation of STR, SAR, CTR, and FTR with structured data validation and audit trails. Manual portal submission does not satisfy automation requirements. Informal approval violates documented workflow requirements.","required_action":"Automate regulatory report generation with structured data validation. Implement formal Maker-Checker approval workflows. Integrate with goAML for automated submission.","regtech_solution":"RegPort automates STR/SAR/CTR/FTR generation with pre-validation against goAML schema requirements. RegComply enforces Maker-Checker approval workflows with full audit trails before automated submission.","regtech_products":["RegPort","RegComply"]},{"section":"5.9","title":"Audit and Governance","status":"Critical Gap","req_tags":[{"label":"Immutable audit trails mandatory","type":"mandatory"},{"label":"Annual AI/ML validation required","type":"conditional"}],"finding":"Johndup maintains manual audit logs with no tamper-proof controls. Standard 5.9(a) requires immutable audit trails for all AML system activity. Internal audit does not cover AML, violating governance requirements. If AI/ML is deployed, 5.5(b)(i) mandates annual independent validation — currently no framework exists.","required_action":"Implement tamper-proof audit logging for all AML activity. Establish internal audit coverage of AML with quarterly reviews. Prepare AI/ML validation framework for future deployment.","regtech_solution":"RegComply provides immutable audit trails with cryptographic timestamping for all system activity. Audit reports are auto-generated for internal audit and CBN examination. AI/ML validation framework is built-in.","regtech_products":["RegComply"]},{"section":"5.10","title":"System Integration and Scalability","status":"Critical Gap","req_tags":[{"label":"Full core banking integration mandatory","type":"mandatory"},{"label":"Standalone feeds prohibited for DMBs","type":"mandatory"}],"finding":"Johndup has no AML system to integrate. Standard 5.10(d) explicitly prohibits standalone transaction feeds for DMBs. Full bidirectional API integration with core banking and KYC systems is mandatory. Manual data extraction cannot satisfy real-time monitoring requirements under 5.5.","required_action":"Deploy AML platform with secure bidirectional API integration to core banking. Ensure real-time transaction feeds and KYC data synchronization. Document integration architecture for CBN examination.","regtech_solution":"RegPort integrates via secure REST APIs with Nigerian core banking platforms including Finacle, T24, and BankOne. Real-time transaction feeds and KYC synchronization are standard. Integration architecture documentation is auto-generated.","regtech_products":["RegPort"]},{"section":"5.11","title":"Security and Data Protection","status":"Critical Gap","req_tags":[{"label":"Encryption and MFA mandatory","type":"mandatory"},{"label":"BIA with RTO/RPO required","type":"mandatory"}],"finding":"Johndup has no encryption or MFA for AML data. Standard 5.11(a) requires encryption at rest and in transit plus enforced MFA. No Business Impact Analysis exists for AML systems, violating 5.11(c) requirements for defined RTO/RPO. Data sovereignty is confirmed (Nigeria), satisfying NDPA requirements.","required_action":"Implement AES-256 encryption at rest and TLS 1.3 in transit. Enforce MFA for all AML system access. Conduct BIA with defined RTO/RPO for AML platform.","regtech_solution":"RegPort enforces AES-256 encryption, TLS 1.3, and mandatory MFA. RegComply includes BIA templates with RTO/RPO documentation. All data is hosted in Nigeria, ensuring NDPA compliance.","regtech_products":["RegPort","RegComply"]},{"section":"5.12","title":"User Interface and Customisation","status":"Critical Gap","req_tags":[{"label":"Real-time dashboards mandatory","type":"mandatory"}],"finding":"Johndup has no AML dashboards. Standard 5.12(a) requires real-time metrics for alert volumes, case status, STR filings, and risk distribution. Investigators need efficient navigation tools for case review. Manual spreadsheets cannot satisfy real-time requirements or examination readiness.","required_action":"Deploy real-time AML dashboards for compliance officers and investigators. Ensure efficient case navigation and drill-down capabilities. Provide role-based access controls.","regtech_solution":"RegComply delivers real-time dashboards with configurable widgets for alert volumes, case aging, STR status, and risk heatmaps. Role-based access ensures investigators see only relevant cases. Drill-down to transaction details is one-click.","regtech_products":["RegComply"]}],"governance_assessment":{"intro":"The CBN Baseline Standards require a comprehensive governance framework spanning policy, oversight, and operational controls. Johndup has zero of ten mandatory governance controls in place, creating critical examination risk. The following assessment maps each control to CBN requirements and remediation actions.","score_percentage":0,"score_context":"Zero governance controls are in place. Johndup has no MLRO, no board-approved AML policy, no BVN/NIN integration, no vendor management framework, and no internal audit coverage of AML. This constitutes critical non-compliance. CBN examination would result in immediate regulatory action.","items":[{"control":"Formally designated MLRO or CCO","status":"Not in place","cbn_ref":"Section 6","category":"Mandatory","action_required":"Appoint MLRO with board approval and documented terms of reference before roadmap submission."},{"control":"Board-approved AML/CFT/CPF Policy","status":"Not in place","cbn_ref":"Section 6","category":"Mandatory","action_required":"Draft and obtain board approval for comprehensive AML/CFT/CPF policy before June 10, 2026."},{"control":"Documented AML Solution Governance Framework","status":"Not in place","cbn_ref":"5.9","category":"Mandatory","action_required":"Establish governance framework covering system ownership, change control, and escalation protocols."},{"control":"Formal Change Control for AML Configurations","status":"Not in place","cbn_ref":"5.9","category":"Mandatory","action_required":"Implement change control process with Maker-Checker approval for scenario rules and thresholds."},{"control":"Model Governance Committee for AI/ML","status":"Not in place","cbn_ref":"5.4(a)(iv)","category":"Conditional","action_required":"Establish committee before AI/ML deployment to oversee model validation and explainability."},{"control":"Documented Alert Review SLAs","status":"Not in place","cbn_ref":"5.5(b)(vi)","category":"Mandatory","action_required":"Document SLAs for alert investigation, escalation, and closure before system deployment."},{"control":"Vendor/Third-Party Management Policy","status":"Not in place","cbn_ref":"Section 6","category":"Mandatory","action_required":"Establish vendor management framework covering due diligence, SLAs, and exit planning."},{"control":"Data Retention and Destruction Policy","status":"Not in place","cbn_ref":"5.11","category":"Mandatory","action_required":"Document retention periods for AML data and secure destruction protocols."},{"control":"BVN/NIN Integration","status":"Not in place","cbn_ref":"5.2(b)(i)","category":"Mandatory","action_required":"Implement real-time BVN/NIN integration via NIBSS APIs before September 2027."},{"control":"AML Training Programme with Documented Records","status":"Not in place","cbn_ref":"Section 6","category":"Mandatory","action_required":"Deploy digital training platform with certification tracking for all staff."}],"overall_score_label":"0 of 10 controls in place","overall_score_rating":"Critical"},"priority_actions":[{"number":1,"title":"CBN Implementation Roadmap Submission","deadline_label":"HARD DEADLINE: 10 JUNE 2026 · MANDATORY FOR ALL INSTITUTIONS","body":"Johndup must submit the 12-section CBN Implementation Roadmap Template by June 10, 2026 — 26 days from this assessment. The template requires executive summary, gap analysis, implementation strategy, timeline, resource plan, vendor selection status, governance framework, training plan, testing protocols, risk mitigation, budget, and board sign-off. Incomplete submissions constitute non-compliance.\n\nOPEX Consulting can complete this template using these assessment findings, coordinate vendor selection documentation, and prepare board presentation materials. Immediate engagement is required to meet the June 10 deadline."},{"number":2,"title":"MLRO Appointment and Board AML Policy Approval","deadline_label":"REQUIRED BEFORE ROADMAP SUBMISSION · JUNE 2026","body":"Johndup must appoint a formally designated MLRO or CCO with documented terms of reference and board approval. The MLRO must have direct board access and authority over AML operations. Concurrently, the board must approve a comprehensive AML/CFT/CPF policy covering risk appetite, governance structure, escalation protocols, and regulatory reporting obligations.\n\nOPEX Consulting can draft the AML/CFT/CPF policy template, prepare MLRO terms of reference, and coordinate board approval process. These governance foundations are prerequisites for credible roadmap submission."},{"number":3,"title":"AML Platform Vendor Selection and Contracting","deadline_label":"COMPLETE BY AUGUST 2026 · 18-MONTH IMPLEMENTATION RUNWAY REQUIRED","body":"Johndup has seen vendor demos but has not selected a platform. Budget constraints are the primary concern. The 18-month compliance timeline requires vendor selection and contracting by August 2026 to allow adequate implementation runway. Delayed vendor selection compresses implementation timelines and increases delivery risk.\n\nOPEX Consulting can conduct g, and evidence pack preparation.","phases":[{"phase_number":1,"title":"Foundation and Roadmap Submission","timeline":"May 2025 – June 2026 (3 months)","description":"Establish governance baseline and submit CBN Implementation Roadmap by June 10, 2026 deadline. Appoint MLRO with board-approved terms of reference. Draft and obtain board approval for AML/CFT/CPF policy. Conduct vendor evaluation and select AML platform provider. Document current-state gap analysis and implementation strategy. Prepare 12-section roadmap template with executive summary, timeline, resource plan, and board sign-off.","deliverables":["MLRO appointment with board-approved terms of reference","Board-approved AML/CFT/CPF policy","Vendor selection and contract execution","CBN Implementation Roadmap Template submitted by June 10, 2026","Current-state gap analysis documentation"],"standards_addressed":"Section 6 governance requirements, roadmap submission mandate"},{"phase_number":2,"title":"Governance and Architecture Design","timeline":"July 2026 – September 2026 (3 months)","description":"Establish AML Solution Governance Framework covering system ownership, change control, and escalation protocols. Design integration architecture for core banking, NIBSS BVN/NIN APIs, and goAML portal. Document Alert Review SLAs and automated closure criteria. Establish Model Governance Committee for future AI/ML deployment. Draft vendor management policy and data retention policy. Conduct Business Impact Analysis with defined RTO/RPO for AML systems.","deliverables":["AML Solution Governance Framework documentation","Integration architecture design for core banking and NIBSS","Documented Alert Review SLAs","Model Governance Committee charter","Vendor management and data retention policies","Business Impact Analysis with RTO/RPO"],"standards_addressed":"5.9 (Audit & Governance), 5.10 (Integration), 5.11 (Security)"},{"phase_number":3,"title":"System Deployment and Integration","timeline":"October 2026 – May 2 function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function getRatingClass(r) {
  const s = String(r || "").toLowerCase();
  if (s.includes('critical')) return 'critical';
  if (s.includes('high')) return 'high';
  if (s.includes('gap') || s.includes('identified') || s.includes('medium')) return 'gap';
  return 'compliant';
}

function getProductLink(name) {
  const n = String(name || "").toLowerCase();
  if (n.includes("regport")) return "https://www.report.regtech365.com/";
  if (n.includes("regguard")) return "https://www.guard.regtech365.com/";
  if (n.includes("regcomply")) return "https://www.comply.regtech365.com/";
  return "https://www.regtech365.com/";
}

function pageHeader(r) {
  return `
    <div class="page-header">
      <span class="page-header-brand">OPEX Consulting · RegTech365</span>
      <span class="page-header-doc">${esc(r.meta.inst_name)} (${esc(r.meta.inst_type)}) · CBN AML Gap Assessment · ${esc(r.meta.report_date)}</span>
    </div>`;
}

function sectionTitle(num, tag, title) {
  return `
    <div class="section-divider">
      <span class="section-label-tag">${esc(tag)}</span>
      <div class="section-header-row">
        <div class="section-num-badge">${esc(num)}</div>
        <h2 class="section-heading">${esc(title)}</h2>
      </div>
    </div>`;
}
