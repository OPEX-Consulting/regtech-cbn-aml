<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBN AML Gap Assessment Report | OPEX Consulting & RegTech365</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0B1D35;
  --navy-mid: #132642;
  --navy-light: #1C3560;
  --gold: #C9A84C;
  --gold-light: #E2C06A;
  --gold-pale: #F6EDD3;
  --white: #FDFCF9;
  --off-white: #F4F1EA;
  --ink: #1A1A2E;
  --muted: #7A8FA8;
  --border: rgba(201,168,76,0.18);
  --border-light: rgba(201,168,76,0.1);
  --critical: #C0392B;
  --critical-bg: #FDF0EE;
  --critical-border: rgba(192,57,43,0.2);
  --high: #D35400;
  --high-bg: #FEF5EE;
  --high-border: rgba(211,84,0,0.2);
  --medium: #D4AC0D;
  --medium-bg: #FEFDF0;
  --medium-border: rgba(212,172,13,0.25);
  --good: #1E8449;
  --good-bg: #EEF7F1;
  --good-border: rgba(30,132,73,0.2);
  --mandatory: #8E44AD;
  --mandatory-bg: #F9F0FF;
  --mandatory-border: rgba(142,68,173,0.2);
  --conditional: #2471A3;
  --conditional-bg: #EEF4FF;
  --conditional-border: rgba(36,113,163,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.7;
}

/* ── COVER PAGE ── */
.cover {
  background: var(--navy);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  page-break-after: always;
}

.cover::before {
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 85% 80%, rgba(201,168,76,0.05) 0%, transparent 50%),
    repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
  pointer-events:none;
}

.cover-body {
  position:relative;
  z-index:1;
  flex:1;
  display:flex;
  flex-direction:column;
  padding: 56px 64px;
}

.cover-brand {
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:auto;
  padding-bottom:48px;
}

.cover-logo {
  width:44px; height:44px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:18px; font-weight:700;
  color: var(--navy);
}

.cover-brand-text { display:flex; flex-direction:column; }
.cover-brand-name { font-size:12px; font-weight:600; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; }
.cover-brand-sub { font-size:10px; color:var(--muted); letter-spacing:0.06em; margin-top:2px; }

.cover-main { flex:1; display:flex; flex-direction:column; justify-content:center; padding:48px 0; }

.cover-eyebrow {
  font-size:11px;
  font-weight:600;
  color:var(--gold);
  letter-spacing:0.2em;
  text-transform:uppercase;
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:12px;
}

.cover-eyebrow::after {
  content:'';
  height:1px;
  width:60px;
  background:var(--gold);
  opacity:0.4;
}

.cover-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,6vw,64px);
  font-weight:600;
  color:var(--white);
  line-height:1.1;
  margin-bottom:8px;
}

.cover-title span { color:var(--gold); }

.cover-subtitle {
  font-size:16px;
  color:rgba(255,255,255,0.5);
  margin-bottom:48px;
  font-weight:300;
}

.cover-meta-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:1px;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:12px;
  overflow:hidden;
  max-width:640px;
}

.cover-meta-cell {
  background:rgba(255,255,255,0.03);
  padding:16px 20px;
}

.cover-meta-label {
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:4px;
}

.cover-meta-value {
  font-size:14px;
  color:var(--white);
  font-weight:500;
}

.cover-meta-value.gold { color:var(--gold); }

/* OVERALL RISK RATING on cover */
.cover-risk {
  margin-top:40px;
  display:inline-flex;
  align-items:center;
  gap:16px;
  border-radius:10px;
  padding:16px 24px;
  max-width:640px;
}

.cover-risk.critical { background:rgba(192,57,43,0.15); border:1px solid rgba(192,57,43,0.35); }
.cover-risk.high { background:rgba(211,84,0,0.15); border:1px solid rgba(211,84,0,0.35); }
.cover-risk.medium { background:rgba(212,172,13,0.15); border:1px solid rgba(212,172,13,0.35); }
.cover-risk.low { background:rgba(30,132,73,0.15); border:1px solid rgba(30,132,73,0.35); }

.cover-risk-badge {
  color:white;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:6px 14px;
  border-radius:6px;
  white-space:nowrap;
}
.badge-critical { background:var(--critical); }
.badge-high { background:var(--high); }
.badge-medium { background:var(--medium); }
.badge-low { background:var(--good); }

.cover-risk-text {
  font-size:13px;
  color:rgba(255,255,255,0.65);
  line-height:1.5;
}

.cover-footer {
  position:relative;
  z-index:1;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:24px 64px 40px;
  border-top:1px solid rgba(201,168,76,0.12);
}

.cover-footer-left { font-size:11px; color:rgba(255,255,255,0.3); line-height:1.6; }
.cover-footer-right { font-size:11px; color:rgba(255,255,255,0.3); text-align:right; }

/* ── LAYOUT ── */
.page { max-width:900px; margin:0 auto; padding:60px 64px; }

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border-light);
}
.page-header-brand { font-size: 10px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; }
.page-header-doc { font-size: 10px; color: var(--muted); }

@media print {
  .cover { min-height:100vh; }
  .page { padding:40px 48px; }
  .no-print { display:none !important; }
  .page-break { page-break-before:always; }
}

/* ── TOC ── */
.toc { padding: 60px 64px; background: var(--off-white); border-bottom: 1px solid var(--border); page-break-after: always; }
.toc-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--navy); margin-bottom: 32px; }
.toc-item { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); font-size: 14px; color: var(--ink); }
.toc-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold); font-weight: 600; width: 24px; }
.toc-label { flex: 1; color: var(--navy); font-weight: 500; }
.toc-dots { flex: 1; border-bottom: 1px dotted rgba(201,168,76,0.3); margin: 0 8px; position: relative; top: -4px; height: 1px; align-self: center; }
.toc-section { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 30px; text-align: right; }

/* ── SECTION HEADINGS ── */
.section-divider {
  margin: 52px 0 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.section-label-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.section-header-row {
  display: flex;
  align-items: center;
  gap: 16px;
}

.section-num-badge {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  color: var(--navy);
  flex-shrink: 0;
}

.section-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.2;
}

/* ── EXECUTIVE SUMMARY ── */
.exec-lead {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--navy);
  line-height: 1.5;
  margin-bottom: 20px;
  padding-left: 20px;
  border-left: 3px solid var(--gold);
}

.exec-body {
  font-size: 14px;
  color: #2C3E50;
  line-height: 1.8;
  margin-bottom: 16px;
}

/* ── SCORECARD ── */
.scorecard {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin:32px 0;
}

.score-cell {
  background:var(--white);
  padding:20px;
  text-align:center;
}

.score-value {
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  font-weight:700;
  line-height:1;
  margin-bottom:6px;
}

.score-label {
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.08em;
  line-height:1.4;
}

.score-critical { color:var(--critical); }
.score-high { color:var(--high); }
.score-gold { color:var(--gold); }
.score-good { color:var(--good); }
.score-navy { color:var(--navy); }

/* ── TABLES ── */
.profile-table, .gov-table, .milestone-table {
  width: 100%;
  border-collapse: collapse;
  margin: 24px 0;
}

.profile-table tr, .gov-table tr, .milestone-table tr {
  border-bottom: 1px solid var(--border-light);
}

.profile-table td {
  padding: 12px 16px;
  font-size: 13.5px;
}

.profile-table td:first-child {
  width: 38%;
  color: var(--muted);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.gov-table th, .milestone-table th {
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: #FAFAF7;
  border-bottom: 1px solid var(--border);
  text-align: left;
}

.gov-table td, .milestone-table td {
  padding: 14px 16px;
  font-size: 13.5px;
}

/* ── TAGS & BADGES ── */
.req-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  margin-right: 4px;
}

.req-mandatory { background: var(--mandatory-bg); border: 1px solid var(--mandatory-border); color: var(--mandatory); }
.req-conditional { background: var(--conditional-bg); border: 1px solid var(--conditional-border); color: var(--conditional); }
.req-cbn { background: #F0F4F8; border: 1px solid #CBD5E0; color: #4A5568; font-family: 'DM Mono', monospace; }

.status-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 4px; white-space: nowrap;
}
.status-critical { background: var(--critical-bg); border: 1px solid var(--critical-border); color: var(--critical); }
.status-high { background: var(--high-bg); border: 1px solid var(--high-border); color: var(--high); }
.status-gap { background: var(--medium-bg); border: 1px solid var(--medium-border); color: var(--medium); }
.status-compliant { background: var(--good-bg); border: 1px solid var(--good-border); color: var(--good); }

/* ── STANDARDS ── */
.std-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
.std-header {
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px;
  padding: 16px 20px; background: #FAFAF7; border-bottom: 1px solid var(--border-light);
}
.std-ref { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--navy); background: rgba(11,29,53,0.06); border-radius: 5px; padding: 4px 10px; }
.std-name { font-size: 14px; font-weight: 600; color: var(--navy); }
.std-body { padding: 20px; }
.std-finding { font-size: 13.5px; color: #2C3E50; line-height: 1.7; margin-bottom: 16px; padding: 14px 16px; background: #FAFAF7; border-left: 3px solid; border-radius: 0 6px 6px 0; }
.std-finding.critical { border-left-color: var(--critical); }
.std-finding.high { border-left-color: var(--high); }
.std-finding.gap { border-left-color: var(--medium); }
.std-finding.compliant { border-left-color: var(--good); }

.std-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
.std-block-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.std-block-text { font-size: 13px; color: #2C3E50; line-height: 1.6; }

.regtech-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.04));
  border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px;
  font-size: 11px; font-weight: 600; color: var(--gold); margin-top: 8px; margin-right: 6px;
}
.regtech-pill::before { content: '→'; color: var(--gold); }

/* ── ALERTS ── */
.inline-alert { display: flex; gap: 16px; align-items: flex-start; padding: 18px 22px; border-radius: 8px; margin: 24px 0; font-size: 13px; line-height: 1.6; }
.ia-icon { font-size: 18px; margin-top: -2px; }
.ia-critical { background: var(--critical-bg); border: 1px solid var(--critical-border); color: #7A1F1F; }
.ia-warn { background: var(--high-bg); border: 1px solid var(--high-border); color: #6B3A00; }
.ia-info { background: #EEF2FB; border: 1px solid #BCC8E3; color: var(--navy-mid); }

/* ── GOVERNANCE ── */
.score-ring-wrap { display: flex; align-items: center; gap: 32px; margin: 32px 0; background: #FAFAF7; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light); }
.score-ring { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.score-ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
.score-ring-denom { font-size: 11px; color: var(--muted); margin-top: 2px; }
.score-ring-context { flex: 1; }
.score-ring-context h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--navy); margin-bottom: 8px; }
.score-ring-context p { font-size: 13px; color: #2C3E50; line-height: 1.6; }

/* ── PRIORITY ACTIONS ── */
.priority-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.priority-header {
  display: flex; align-items: flex-start; gap: 16px; padding: 18px 20px;
  background: linear-gradient(135deg, rgba(11,29,53,0.03), rgba(201,168,76,0.04));
  border-bottom: 1px solid var(--border-light);
}
.priority-num {
  width: 36px; height: 36px; background: var(--navy); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--gold); flex-shrink: 0;
}
.priority-title { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.priority-deadline { font-size: 11px; color: var(--critical); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
.priority-body { padding: 18px 20px; font-size: 13px; color: #2C3E50; line-height: 1.7; }

/* ── ROADMAP ── */
.roadmap-phase { position: relative; padding-left: 32px; margin-bottom: 32px; }
.roadmap-phase::before {
  content: ''; position: absolute; left: 10px; top: 36px; bottom: -16px; width: 1px; background: var(--border);
}
.roadmap-phase:last-child::before { display: none; }
.phase-dot {
  position: absolute; left: 0; top: 6px; width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: 3px solid var(--white); box-shadow: 0 0 0 1px var(--border);
}
.phase-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.phase-label { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; background: rgba(201,168,76,0.08); border: 1px solid var(--border); border-radius: 4px; padding: 2px 10px; }
.phase-timeline { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.phase-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.phase-body { font-size: 13.5px; color: #2C3E50; line-height: 1.7; margin-bottom: 12px; }
.phase-deliverables { display: flex; flex-wrap: wrap; gap: 6px; }
.deliverable-tag { font-size: 11px; background: #F0F4F8; border: 1px solid #CBD5E0; border-radius: 4px; padding: 3px 10px; color: #4A5568; }
.services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 24px; }
.service-item { display: flex; gap: 12px; margin-bottom: 0 !important; }

/* ── PRODUCT CARDS ── */
.regtech-product-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.regtech-product-header { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); }
.product-icon {
  width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; color: var(--navy);
}
.product-name { font-size: 15px; font-weight: 600; color: var(--white); }
.product-name a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 1px; }
.product-tagline { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.regtech-product-body { padding: 18px 20px; }
.gap-closed-tag { font-size: 11px; background: var(--mandatory-bg); border: 1px solid var(--mandatory-border); color: var(--mandatory); border-radius: 4px; padding: 2px 10px; font-family: 'DM Mono', monospace; margin-right: 6px; margin-bottom: 6px; display: inline-block; }
.product-desc { font-size: 13.5px; color: #2C3E50; line-height: 1.7; }

/* ── CTA ── */
.cta-box { background: var(--navy); border-radius: 16px; padding: 40px; text-align: center; margin: 40px 0; position: relative; overflow: hidden; }
.cta-box::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(201,168,76,0.1), transparent); }
.cta-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--white); margin-bottom: 12px; position: relative; }
.cta-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto; position: relative; }
.cta-buttons { display: flex; justify-content: center; gap: 16px; position: relative; }
.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px; }
.btn-secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 500; font-size: 13px; }

/* ── FOOTER ── */
.disclaimer { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 20px 0; border-top: 1px solid var(--border-light); margin-top: 40px; }
.print-bar { position: fixed; bottom: 24px; right: 24px; z-index: 1000; display: flex; gap: 8px; }
.btn-print { background: var(--navy); color: var(--gold); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 10px 20px; border-radius: 8px; cursor: pointer; letter-spacing: 0.05em; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: all 0.2s; }

bined with None system status creates immediate examination vulnerability. The institution must resolve the contradiction between reported capabilities and declared infrastructure before the March 2028 deadline."},"profile":{"sector_context_box":"Fintech MFBs processing >500K daily transactions across mobile money, card issuance, and agent networks face heightened CBN scrutiny. High-risk classification mandates real-time monitoring, AI-enabled screening, and immutable audit trails — impossible without an integrated platform."},"requirement_categories_intro":"The CBN Baseline Standards establish 12 mandatory technical requirements and 10 governance controls applicable to all regulated institutions. Muna MFB's fintech MFB classification, High-risk status, and product profile trigger additional conditional requirements across sanctions screening, fraud monitoring, and AI/ML governance.","requirement_categories_alert":"Muna MFB has reported AML system status as None while simultaneously claiming full functional coverage across all domains. This contradiction renders all requirements non-compliant until resolved through independent validation audit.","requirement_categories":[{"area":"Integrated AML Solution — Core Functional Footprint","cbn_ref":"5.1(A)","category":"Mandatory","trigger":"Universal requirement for all institutions. Muna MFB must deploy integrated platform covering all eight AML functions before March 2028."},{"area":"CDD/KYC/KYB — Real-Time BVN/NIN Integration","cbn_ref":"5.2(B)","category":"Mandatory","trigger":"All institutions must integrate real-time BVN/NIN verification. Muna MFB reports Real-time status but None system — requires validation."},{"area":"CDD/KYC/KYB — UBO Mapping for Corporate Customers","cbn_ref":"5.2(C)","category":"Mandatory","trigger":"Applies to all institutions offering corporate/business accounts. Muna MFB's credit/loans product line triggers this requirement."},{"area":"Sanctions & PEP Screening — Real-Time AI Capability","cbn_ref":"5.3(A)","category":"Mandatory","trigger":"Universal requirement. Muna MFB's PEP exposure and High-risk status mandate AI-enabled screening across domestic and international lists."},{"area":"Customer Risk Assessment — Dynamic Scoring Engine","cbn_ref":"5.4(A)","category":"Mandatory","trigger":"All institutions must deploy automated risk scoring. Muna MFB's High-risk classification requires continuous recalibration based on transaction behaviour."},{"area":"Transaction Monitoring — Multi-Scenario Real-Time Engine","cbn_ref":"5.5(A)","category":"Mandatory","trigger":"Universal requirement. Muna MFB's >500K daily transaction volume makes real-time monitoring operationally essential, not optional."},{"area":"Transaction Monitoring — Cross-Border FX Scenarios","cbn_ref":"5.5(C)","category":"Conditional","trigger":"Triggered by Muna MFB's cross-border FX risk factor. Requires dedicated scenarios for currency exchange, remittance structuring, and trade-based laundering."},{"area":"Fraud Monitoring — Real-Time Detection with Risk Feed","cbn_ref":"5.6(A)","category":"Conditional","trigger":"Triggered by Muna MFB's card issuance and mobile money products. Card fraud patterns must feed customer risk scores in real time."},{"area":"Fraud Monitoring — Agent Network Controls","cbn_ref":"5.6(B)","category":"Conditional","trigger":"Triggered by Muna MFB's agent banking network. Requires agent-level transaction monitoring, velocity checks, and suspicious pattern detection."},{"area":"Enterprise Case Management — Maker-Checker Workflow","cbn_ref":"5.7(A)","category":"Mandatory","trigger":"All institutions must implement ECM with segregation of duties. Muna MFB's High-risk status requires documented approval chains for all STR/CTR filings."},{"area":"Regulatory Reporting — Automated goAML/NFIU Filing","cbn_ref":"5.8(A)","category":"Mandatory","trigger":"Universal requirement. Muna MFB reports Fully automated status but None system — requires immediate reconciliation and validation."},{"area":"Audit Trail — Immutable Logging with Twice-Yearly Internal Audit","cbn_ref":"5.9(A)","category":"Mandatory","trigger":"All institutions must maintain immutable audit logs. Muna MFB's reported twice-yearly audit frequency meets minimum standard if AML-focused."},{"area":"Core Banking Integration — Bidirectional Real-Time Data Exchange","cbn_ref":"5.10(A)","category":"Mandatory","trigger":"Universal requirement. Muna MFB's mobile app, internet banking, and ATM/POS channels require real-time transaction feed to AML platform."},{"area":"Data Security — Encryption, MFA, Nigeria Data Sovereignty","cbn_ref":"5.11(A)","category":"Mandatory","trigger":"All institutions must encrypt data at rest and in transit, enforce MFA, and host AML data in Nigeria. Muna MFB reports Full compliance — requires validation."},{"area":"Management Reporting — Real-Time Dashboards and Customisation","cbn_ref":"5.12(A)","category":"Mandatory","trigger":"Universal requirement. Muna MFB's High-risk status requires Board-level dashboards showing alert volumes, STR trends, and model performance metrics."},{"area":"AI/ML Model Governance — Model Risk Management Framework","cbn_ref":"6.3(B)","category":"Conditional","trigger":"Triggered by Muna MFB's reported AI/ML usage in AML. Requires Model Governance Committee, validation protocols, and bias testing documentation."},{"area":"CBN Implementation Roadmap Template Submission","cbn_ref":"Circular Para 8","category":"Mandatory","trigger":"Universal deadline of 10 June 2026 for all institutions. Muna MFB reports Submitted status — OPEX can validate completeness and accuracy."}],"gap_analysis_intro":"The following analysis evaluates Muna MFB's compliance with each of the 12 CBN Baseline Standards. The fundamental contradiction between reported None system status and claimed full functional coverage renders all standards non-compliant until resolved through independent validation.","standards":[{"section":"5.1","title":"Integrated AML Solution","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports AML system status as None, yet simultaneously claims full coverage across CDD/KYC, sanctions screening, transaction monitoring, fraud detection, case management, regulatory reporting, risk assessment, and audit trail. This is a logical impossibility. Section 5.1 requires an integrated platform unifying all eight functions with shared data architecture, workflow orchestration, and centralised governance. Operating >500K daily transactions across mobile money, card issuance, and agent networks without an integrated system exposes Muna MFB to immediate regulatory intervention under the High-risk classification.","required_action":"Muna MFB must immediately commission an independent validation audit to reconcile reported capabilities with actual infrastructure. If no integrated platform exists, the institution faces a 24-month build-out to March 2028 covering platform selection, vendor contracting, core banking integration, AI/ML model deployment, and staff training. If a platform exists but was misreported, Muna MFB must document the architecture, produce evidence of integration, and submit corrected roadmap to CBN by 10 June 2026.","regtech_solution":"RegPort provides the integrated AML platform mandated by 5.1, unifying CDD/KYC, sanctions/PEP screening, transaction monitoring, and regulatory reporting in a single architecture. RegGuard delivers real-time fraud monitoring with bidirectional risk feed. RegComply provides enterprise case management with Maker-Checker workflows and immutable audit trail. RegLearn ensures documented AML training records. This four-product suite closes the 5.1 gap for Muna MFB's fintech MFB profile.","regtech_products":["RegPort","RegGuard","RegComply","RegLearn"]},{"section":"5.2","title":"Customer Due Diligence (CDD/KYC/KYB)","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Real-time BVN/NIN integration, Full KYC review automation, and Full UBO mapping — all impossible without an integrated AML platform. Section 5.2 mandates real-time identity verification at onboarding and periodic review, automated risk-based KYC refresh cycles, and UBO mapping for all corporate customers. Muna MFB's credit/loans product line creates corporate customer exposure requiring UBO transparency. The None system status means these capabilities do not exist, exposing Muna MFB to onboarding of high-risk customers, PEPs, and shell companies without detection.","required_action":"Muna MFB must deploy real-time BVN/NIN integration via NIBSS API, implement automated KYC review workflows triggered by risk score changes or time-based cycles, and build UBO mapping functionality for all business accounts. If these capabilities already exist, Muna MFB must produce API integration logs, KYC review audit trails, and UBO mapping evidence for CBN examination. The contradiction must be resolved before the March 2028 deadline.","regtech_solution":"RegPort's CDD/KYC module provides real-time BVN/NIN verification via NIBSS integration, automated risk-based KYC review scheduling, and UBO mapping with beneficial ownership percentage tracking. The platform flags PEP relationships, adverse media, and sanctions matches during onboarding and periodic refresh. For Muna MFB's >500K customer base, RegPort automates the entire 5.2 requirement set, eliminating manual review bottlenecks and ensuring High-risk customers receive enhanced due diligence.","regtech_products":["RegPort"]},{"section":"5.3","title":"Sanctions and PEP Screening","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"},{"label":"CONDITIONAL — TRIGGERED FOR MUNA MFB (PEP EXPOSURE)","type":"conditional"}],"finding":"Muna MFB reports Real-time AI sanctions screening capability but screens only CBN/EFCC domestic lists, omitting OFAC, UN Security Council, EU, and UK HMT sanctions lists. Section 5.3 requires screening against all major international sanctions regimes, not just domestic lists. Muna MFB's cross-border FX risk factor and PEP exposure mandate comprehensive screening. The None system status means no screening occurs, allowing sanctioned individuals, entities, and PEPs to onboard and transact undetected. This creates direct regulatory liability and correspondent banking risk.","required_action":"Muna MFB must deploy AI-enabled sanctions and PEP screening covering CBN/EFCC, OFAC, UN Security Council, EU, and UK HMT lists. Screening must occur in real time at onboarding, transaction processing, and periodic customer review. The platform must support fuzzy matching, transliteration, and alias detection to minimise false positives. If Muna MFB already screens these lists, evidence of list coverage, match logic, and alert disposition must be produced for CBN examination before March 2028.","regtech_solution":"RegPort's sanctions and PEP screening engine covers all major international lists including OFAC, UN, EU, UK HMT, and CBN/EFCC domestic lists. The AI-enabled matching algorithm uses fuzzy logic, phonetic matching, and transliteration to detect sanctions exposure across customer names, beneficial owners, and transaction counterparties. For Muna MFB's PEP exposure, RegPort flags domestic and foreign PEPs, their relatives, and close associates, triggering enhanced due diligence workflows automatically.","regtech_products":["RegPort"]},{"section":"5.4","title":"Customer Risk Assessment","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Full customer risk assessment coverage, yet operates with None system status. Section 5.4 requires automated risk scoring engines that assign risk ratings (Low, Medium, High, Prohibited) based on customer profile, transaction behaviour, geographic exposure, product usage, and sanctions/PEP status. Muna MFB's High CBN risk classification and exposure to PEPs, cross-border FX, agent networks, and card products create a complex risk landscape requiring dynamic, real-time risk scoring. Without an integrated platform, risk assessment is either absent or conducted manually — both non-compliant.","required_action":"Muna MFB must deploy an automated customer risk assessment engine that calculates risk scores at onboarding and recalculates continuously based on transaction behaviour, sanctions matches, adverse media, and product usage. The engine must support risk-based KYC review cycles, transaction monitoring scenario calibration, and enhanced due diligence triggers. If Muna MFB already operates such an engine, evidence of scoring logic, recalculation frequency, and risk-based workflow triggers must be documented for CBN examination.","regtech_solution":"RegPort's customer risk assessment module assigns risk ratings using a configurable scoring model that weighs customer profile attributes, transaction patterns, sanctions/PEP exposure, and product risk. For Muna MFB's High-risk profile, the engine recalculates scores in real time when fraud alerts fire, sanctions matches occur, or transaction velocity spikes. Risk scores drive KYC review frequency, transaction monitoring sensitivity, and enhanced due diligence requirements, ensuring Muna MFB's compliance with 5.4.","regtech_products":["RegPort"]},{"section":"5.5","title":"Transaction Monitoring","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"},{"label":"CONDITIONAL — TRIGGERED FOR MUNA MFB (CROSS-BORDER FX)","type":"conditional"}],"finding":"Muna MFB reports Full transaction monitoring coverage while declaring None system status. Section 5.5 mandates real-time, multi-scenario transaction monitoring covering structuring, smurfing, rapid movement of funds, round-tripping, trade-based money laundering, and cross-border FX abuse. Muna MFB processes >500K daily transactions across mobile money, card issuance, and agent networks — a volume and complexity profile that makes manual monitoring operationally impossible. The cross-border FX risk factor requires dedicated scenarios for currency exchange structuring and remittance layering. Without real-time monitoring, Muna MFB cannot detect or report suspicious activity, violating both 5.5 and the Money Laundering (Prevention and Prohibition) Act 2022.","required_action":"Muna MFB must deploy a real-time transaction monitoring engine with pre-configured scenarios for structuring, velocity, dormancy reactivation, round-tripping, and cross-border FX abuse. The engine must process all transactions from mobile app, internet banking, ATM/POS, and agent network channels in real time, generating alerts for investigation. If Muna MFB already operates such an engine, evidence of scenario coverage, alert volumes, investigation outcomes, and STR filing rates must be produced for CBN examination before March 2028.","regtech_solution":"RegPort's transaction monitoring engine processes Muna MFB's >500K daily transactions in real time, applying multi-scenario detection logic for structuring, smurfing, rapid movement, round-tripping, and cross-border FX abuse. The engine ingests transactions from all channels (mobile app, internet banking, ATM/POS, agent network) via core banking integration, generates risk-scored alerts, and routes cases to RegComply for investigation. For Muna MFB's cross-border FX exposure, RegPort includes dedicated scenarios for currency exchange structuring and remittance layering.","regtech_products":["RegPort","RegComply"]},{"section":"5.6","title":"Fraud Monitoring","status":"Critical Gap","req_tags":[{"label":"CONDITIONAL — TRIGGERED FOR MUNA MFB (CARD PRODUCTS + AGENT NETWORK)","type":"conditional"}],"finding":"Muna MFB reports Full fraud monitoring coverage with bidirectional fraud-to-risk feed, yet operates with None system status. Section 5.6 requires real-time fraud detection for card products, mobile money, and agent networks, with fraud patterns feeding customer risk scores to detect money laundering disguised as fraud. Muna MFB's card issuance and agent banking network create elevated fraud exposure — card-not-present fraud, SIM swap attacks, agent collusion, and account takeover. Without integrated fraud monitoring, Muna MFB cannot distinguish genuine fraud from money laundering, cannot feed fraud intelligence to transaction monitoring, and cannot meet 5.6 requirements.","required_action":"Muna MFB must deploy real-time fraud monitoring covering card transactions, mobile money transfers, and agent network activity. The fraud engine must detect card-not-present fraud, velocity abuse, SIM swap attacks, account takeover, and agent collusion. Fraud alerts must feed customer risk scores in real time, triggering enhanced transaction monitoring for customers exhibiting fraud patterns. If Muna MFB already operates such a system, evidence of fraud scenario coverage, alert volumes, fraud-to-risk feed integration, and case outcomes must be documented for CBN examination.","regtech_solution":"RegGuard provides real-time fraud monitoring for Muna MFB's card issuance, mobile money, and agent network channels. The platform detects card-not-present fraud, velocity abuse, SIM swap attacks, account takeover, and agent collusion using AI-enabled pattern recognition. Fraud alerts feed RegPort's customer risk assessment engine in real time, ensuring customers with fraud exposure receive elevated risk scores and enhanced transaction monitoring. This bidirectional integration satisfies 5.6 requirements for Muna MFB's High-risk profile.","regtech_products":["RegGuard","RegPort"]},{"section":"5.7","title":"Enterprise Case Management","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Full case management coverage while declaring None system status. Section 5.7 requires enterprise case management (ECM) with Maker-Checker workflows, segregation of duties, documented investigation trails, and audit-ready case files. Muna MFB's High-risk classification and >500K daily transaction volume generate significant alert volumes requiring structured investigation, escalation, and STR/CTR filing workflows. Without ECM, Muna MFB cannot demonstrate to CBN examiners that alerts were investigated, decisions were documented, and STRs were filed appropriately. This creates direct regulatory liability.","required_action":"Muna MFB must deploy an enterprise case management platform with Maker-Checker workflows, role-based access controls, documented investigation steps, and audit trail logging. The platform must integrate with transaction monitoring and fraud detection engines to auto-populate case files with transaction data, customer profiles, and risk scores. If Muna MFB already operates such a platform, evidence of case volumes, investigation timelines, STR filing rates, and Maker-Checker audit trails must be produced for CBN examination before March 2028.","regtech_solution":"RegComply provides enterprise case management with Maker-Checker workflows, segregation of duties, and immutable audit trails. Cases auto-populate with transaction data from RegPort and fraud alerts from RegGuard, eliminating manual data entry. Investigators document findings, escalate to MLRO/CCO for review, and file STRs/CTRs directly to goAML/NFIU via automated integration. For Muna MFB's High-risk profile, RegComply ensures every alert is investigated, every decision is documented, and every case file is examination-ready.","regtech_products":["RegComply","RegPort","RegGuard"]},{"section":"5.8","title":"Regulatory Reporting (STR/CTR/goAML)","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Fully automated regulatory reporting with documented approval workflows, yet operates with None system status. Section 5.8 requires automated STR/CTR filing to goAML/NFIU with Maker-Checker approval, audit trail logging, and filing confirmation tracking. Muna MFB's High-risk classification and transaction volume create significant STR/CTR filing obligations. Without automated reporting, Muna MFB risks late filings, incomplete data, and non-compliance with NFIU reporting standards. Manual email or portal submissions do not satisfy 5.8 requirements.","required_action":"Muna MFB must deploy automated regulatory reporting integration with goAML/NFIU, supporting STR, CTR, and other mandatory filings. The platform must enforce Maker-Checker approval workflows, log all filing activity in immutable audit trails, and track filing confirmations from NFIU. If Muna MFB already operates such integration, evidence of filing volumes, approval workflows, audit trails, and NFIU confirmation receipts must be documented for CBN examination before March 2028.","regtech_solution":"RegComply provides automated regulatory reporting integration with goAML/NFIU, enabling one-click STR/CTR filing from case management workflows. The platform enforces Maker-Checker approval, logs all filing activity in immutable audit trails, and tracks NFIU confirmation receipts. For Muna MFB's High-risk profile, RegComply ensures timely, accurate, and audit-ready regulatory filings, satisfying 5.8 requirements and eliminating manual submission risk.","regtech_products":["RegComply"]},{"section":"5.9","title":"Audit Trail and Internal Audit","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Full audit trail coverage and twice-yearly internal audit of AML, yet operates with None system status. Section 5.9 requires immutable audit trails logging all AML system activity — user access, configuration changes, alert generation, case investigation, STR filing, and model recalibration. Muna MFB's High-risk classification requires internal audit coverage of AML at least twice yearly, with audit findings documented and remediation tracked. Without an integrated platform, no audit trail exists, and internal audit cannot validate AML effectiveness.","required_action":"Muna MFB must deploy immutable audit trail logging across all AML system components, capturing user activity, configuration changes, alert generation, case workflows, and regulatory filings. Internal audit must review AML effectiveness at least twice yearly, covering transaction monitoring scenario performance, sanctions screening accuracy, case investigation quality, and STR filing timeliness. If Muna MFB already maintains such audit trails and conducts AML-focused internal audits, evidence of audit logs, audit reports, and remediation tracking must be produced for CBN examination.","regtech_solution":"RegComply provides immutable audit trail logging across all RegTech365 products, capturing user access, configuration changes, alert generation, case investigation steps, and regulatory filings. Audit logs are tamper-proof and exportable for internal audit review. For Muna MFB's twice-yearly internal audit requirement, RegComply generates audit-ready reports covering transaction monitoring performance, sanctions screening accuracy, case investigation quality, and STR filing timeliness, ensuring 5.9 compliance.","regtech_products":["RegComply","RegPort","RegGuard"]},{"section":"5.10","title":"Core Banking Integration","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB operates mobile app, internet banking, ATM/POS, and branch network channels, all requiring real-time transaction feed to the AML platform. Section 5.10 mandates bidirectional integration between core banking and AML systems, enabling real-time transaction ingestion, customer data synchronisation, and risk score feedback. Muna MFB's None system status means no integration exists, preventing real-time transaction monitoring, sanctions screening at transaction time, and fraud detection. Without 5.10 compliance, Muna MFB cannot satisfy 5.5, 5.6, or 5.3 requirements.","required_action":"Muna MFB must implement bidirectional real-time integration between its core banking system and AML platform, enabling transaction ingestion from all channels (mobile app, internet banking, ATM/POS, branch network), customer data synchronisation, and risk score feedback. The integration must support API-based data exchange with sub-second latency for transaction monitoring and sanctions screening. If Muna MFB already operates such integration, evidence of API specifications, data flow diagrams, and latency metrics must be documented for CBN examination.","regtech_solution":"RegPort integrates with Muna MFB's core banking system via RESTful API, ingesting transactions in real time from mobile app, internet banking, ATM/POS, and branch network channels. The integration synchronises customer data, account balances, and transaction history, enabling real-time transaction monitoring, sanctions screening, and fraud detection. Risk scores calculated by RegPort feed back to core banking, enabling risk-based transaction limits and enhanced due diligence triggers. This bidirectional integration satisfies 5.10 requirements.","regtech_products":["RegPort"]},{"section":"5.11","title":"Data Security and Sovereignty","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Full encryption, Full MFA enforcement, Nigeria data sovereignty, and BIA with AML coverage — yet operates with None system status. Section 5.11 requires encryption of AML data at rest and in transit, multi-factor authentication for all AML system users, hosting of AML data within Nigeria, and Business Impact Analysis covering AML system availability. Muna MFB's High-risk classification and >500K customer base create significant data security obligations. Without an integrated platform, these controls cannot exist, exposing Muna MFB to data breaches, unauthorised access, and regulatory sanctions.","required_action":"Muna MFB must deploy AML platform infrastructure with AES-256 encryption at rest, TLS 1.3 encryption in transit, multi-factor authentication for all users, and hosting within Nigeria-based data centres. The institution must conduct Business Impact Analysis covering AML system availability, defining Recovery Time Objectives (RTO) and Recovery Point Objectives (RPO). If Muna MFB already operates such infrastructure, evidence of encryption protocols, MFA enforcement logs, data centre location, and BIA documentation must be produced for CBN examination.","regtech_solution":"RegTech365 products deploy on Nigeria-based cloud infrastructure with AES-256 encryption at rest, TLS 1.3 encryption in transit, and mandatory multi-factor authentication for all users. The platform architecture supports Business Impact Analysis with defined RTO/RPO metrics, ensuring AML system availability meets Muna MFB's High-risk profile requirements. Data sovereignty is guaranteed through Nigeria-based hosting, satisfying 5.11 requirements and CBN data localisation mandates.","regtech_products":["RegPort","RegGuard","RegComply","RegLearn"]},{"section":"5.12","title":"Management Reporting and Dashboards","status":"Critical Gap","req_tags":[{"label":"MANDATORY — ALL INSTITUTIONS","type":"mandatory"}],"finding":"Muna MFB reports Full management reporting coverage while declaring None system status. Section 5.12 requires real-time dashboards for Board, MLRO/CCO, and operational teams, covering alert volumes, investigation timelines, STR filing rates, sanctions match rates, model performance metrics, and regulatory examination readiness. Muna MFB's High-risk classification requires Board-level visibility into AML effectiveness, enabling informed risk decisions and regulatory engagement. Without an integrated platform, no dashboards exist, preventing Board oversight and MLRO/CCO accountability.","required_action":"Muna MFB must deploy real-time management reporting dashboards covering alert volumes, case investigation timelines, STR/CTR filing rates, sanctions screening match rates, fraud detection performance, and AI/ML model accuracy. Dashboards must be role-based, providing Board-level summaries, MLRO/CCO operational metrics, and analyst-level case queues. If Muna MFB already operates such dashboards, evidence of dashboard configurations, user access logs, and Board reporting frequency must be documented for CBN examination.","regtech_solution":"RegComply provides real-time management reporting dashboards for Muna MFB's Board, MLRO/CCO, and operational teams. Dashboards display alert volumes, investigation timelines, STR filing rates, sanctions match rates, fraud detection performance, and AI/ML model accuracy. For Muna MFB's High-risk profile, Board dashboards highlight regulatory examination readiness, enabling informed risk decisions and proactive CBN engagement. Dashboards are fully customisable, satisfying 5.12 requirements.","regtech_products":["RegComply","RegPort","RegGuard"]}],"governance_assessment":{"intro":"Muna MFB reports 10/10 governance controls in place, yet operates with None AML system status. This contradiction renders the governance assessment unreliable. The following analysis evaluates each control against CBN requirements, noting that reported compliance cannot be verified without independent validation audit.","score_percentage":100,"score_context":"Muna MFB's reported 10/10 governance score is inconsistent with None system status. If the institution genuinely operates without an integrated AML platform, governance controls cannot function as reported. Independent validation audit is required to reconcile reported governance with actual infrastructure before CBN examination.","items":[{"control":"Formally designated MLRO or CCO","status":"In place","cbn_ref":"6.1(A)","category":"Mandatory","action_required":"Valid function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function getRatingClass(r) {
  const s = String(r || "").toLowerCase();
  if (s.includes('critical')) return 'critical';
  if (s.includes('high')) return 'high';
  if (s.includes('gap') || s.includes('identified') || s.includes('medium')) return 'gap';
  return 'compliant';
}

function pageHeader(r) {
  return `
    <div class="page-header">
      <span class="page-header-brand">OPEX Consulting · RegTech365</span>
      <span class="page-header-doc">${esc(r.meta.inst_name)} (${esc(r.meta.inst_type)}) · CBN AML Gap Assessment · ${esc(r.meta.report_date)}</span>
    </div>`;
}

function sectionTitle(num, tag, title) {
  return `
    <div class="section-divider">
      <span class="section-label-tag">${esc(tag)}</span>
      <div class="section-header-row">
        <div class="section-num-badge">${esc(num)}</div>
        <h2 class="section-heading">${esc(title)}</h2>
      </div>
    </div>`;
}

      <tr><td>Geographic Footprint</td><td>${esc(r.meta.geo)}</td></tr>
      <tr><td>Group / Holding Structure</td><td>${esc(r.meta.group_structure)}</td></tr>
      <tr><td>Elevated Risk Indicators</td><td>${esc(r.meta.risk_factors_display)}</td></tr>
      <tr><td>Roadmap Submission Deadline</td><td><strong style="color:var(--critical)">${esc(r.meta.roadmap_deadline)}</strong></td></tr>
      <tr><td>Full Compliance Deadline</td><td>${esc(r.meta.compliance_deadline)}</td></tr>
    </table>
    <div class="inline-alert ia-info">
      <span class="ia-icon">ℹ</span>
      <span><strong>Why ${esc(r.meta.inst_name)}'s status matters.</strong> ${esc(r.profile.sector_context_box || r.scorecard.regulatory_context_box)}</span>
    </div>
  </div>`;

  // 5. REQUIREMENT CATEGORIES
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("03", "Section Three", "Requirement Categories — Mandatory vs Conditional");
  h += `<p class="exec-body">${esc(r.requirement_categories_intro)}</p>
    <div class="legend-box">
      <div class="legend-item"><span class="req-tag req-mandatory">Mandatory</span> Applies to all without exception</div>
      <div class="legend-item"><span class="req-tag req-conditional">Conditional</span> Activated by risk/type</div>
      <div class="legend-item"><span class="req-tag req-cbn">5.x</span> CBN circular section</div>
    </div>
    <table class="gov-table">
      <thead><tr><th>Requirement Area</th><th>CBN Ref</th><th>Category</th><th>Trigger for ${esc(r.meta.inst_name)}</th></tr></thead>
      <tbody>
        ${(r.requirement_categories || []).map(row => `
          <tr>
            <td>${esc(row.area)}</td>
            <td><span class="req-tag req-cbn">${esc(row.cbn_ref)}</span></td>
            <td><span class="req-tag req-${esc(row.category.toLowerCase())}">${esc(row.category)}</span></td>
            <td>${esc(row.trigger)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <div class="inline-alert ia-warn">
      <span class="ia-icon">⚡</span>
      <span>${esc(r.requirement_categories_alert)}</span>
    </div>
  </div>`;

  // 6. STANDARDS
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("04", "Section Four", "Gap Analysis — 12 CBN Baseline Standards");
  (r.standards || []).forEach(s => {
    const sC = getRatingClass(s.status);
    h += `
    <div class="std-card avoid-break">
      <div class="std-header">
        <div class="std-ref">${esc(s.section)}</div>
        <div class="std-name">${esc(s.title)}</div>
        <div class="std-badges"><span class="status-badge status-${sC}">${esc(s.status)}</span></div>
      </div>
      <div class="std-body">
        <div style="margin-bottom:12px">
          ${(s.req_tags || []).map(tag => `<span class="req-tag req-${tag.type}">${esc(tag.label)}</span>`).join('')}
        </div>
        <div class="std-finding ${sC}">${esc(s.finding)}</div>
        <div class="std-grid">
          <div><div class="std-block-label">Required Action</div><div class="std-block-text">${esc(s.required_action || s.action)}</div></div>
          <div>
            <div class="std-block-label">RegTech365 Solution</div>
            <div class="std-block-text">${esc(s.regtech_solution || s.solution)}</div>
            <div>${(s.regtech_products || []).map(p => `<span class="regtech-pill">${esc(p)}</span>`).join('')}</div>
          </div>
        </div>
      </div>
    </div>`;
  });
  h += `</div>`;

  // 7. GOVERNANCE
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("05", "Section Five", "Governance Assessment — Section 6 Controls");
  h += `<p class="exec-body">${esc(r.governance_assessment.intro)}</p>`;
  
  const gPct = r.governance_assessment.score_percentage || 0;
  const dashOffset = 314 - (3.14 * gPct);

  h += `
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#F0F0E8" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="${gPct < 50 ? '#C0392B':'#1E8449'}" stroke-width="10" stroke-dasharray="314" stroke-dashoffset="${dashOffset}" stroke-linecap="round"/>
        </svg>
        <div class="score-ring-label"><span class="score-ring-num">${gPct}%</span></div>
      </div>
      <div class="score-ring-context">
        <h3>Governance Score — ${esc(r.scorecard.governance_score_rating)}</h3>
        <p>${esc(r.governance_assessment.score_context)}</p>
      </div>
    </div>
    <table class="gov-table">
      <thead><tr><th>Governance Control</th><th>CBN Ref</th><th>Category</th><th>${esc(r.meta.inst_name)} Status</th><th>Action Required</th></tr></thead>
      <tbody>
        ${(r.governance_assessment.items || []).map(item => `
          <tr>
            <td><strong>${esc(item.control)}</strong></td>
            <td><span class="req-tag req-cbn">${esc(item.cbn_ref)}</span></td>
            <td><span class="req-tag req-${esc(item.category.toLowerCase())}" style="font-size:9px">${esc(item.category)}</span></td>
            <td>${esc(item.status)}</td>
            <td>${esc(item.action_required)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;

  // 8. PRIORITY ACTIONS
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("06", "Section Six", "Top 5 Priority Actions");
  (r.priority_actions || []).forEach((a, i) => {
    h += `
    <div class="priority-card">
      <div class="priority-header">
        <div class="priority-num">0${a.number || i+1}</div>
        <div>
          <div class="priority-title">${esc(a.title)}</div>
          <div class="priority-deadline">${esc(a.deadline_label)}</div>
        </div>
      </div>
      <div class="priority-body">${esc(a.body)}</div>
    </div>`;
  });
  h += `</div>`;

  // 9. ROADMAP
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("07", "Section Seven", "Recommended Implementation Roadmap");
  h += `<p class="exec-body">${esc(r.roadmap.intro)}</p>`;
  (r.roadmap.phases || []).forEach((p) => {
    h += `
    <div class="roadmap-phase">
      <div class="phase-dot"></div>
      <div class="phase-header"><span class="phase-label">Phase ${p.phase_number}</span><span class="phase-timeline">${esc(p.timeline)}</span></div>
      <h3 class="phase-title">${esc(p.title)}</h3>
      <p class="phase-body">${esc(p.body || p.description)}</p>
      <div class="phase-deliverables">${(p.deliverables || []).map(d => `<span class="deliverable-tag">${esc(d)}</span>`).join('')}</div>
    </div>`;
  });
  
  h += `
    <table class="milestone-table">
      <thead><tr><th>Milestone</th><th>Target Date</th><th>Owner</th></tr></thead>
      <tbody>
        ${(r.roadmap.milestones || []).map(m => `
          <tr><td>${esc(m.milestone)}</td><td>${esc(m.target_date)}</td><td>${esc(m.owner)}</td></tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;

  // 10. PRODUCT SUITE
  h += `<div class="page">`;
  h += pageHeader(r);
  h += sectionTitle("08", "Section Eight", "RegTech365 Product Suite & Advisory");
  h += `<p class="exec-body">${esc(r.support_section.intro_paragraph)}</p>
    <div class="inline-alert ia-info"><span class="ia-icon">💡</span><span><strong>What makes this different.</strong> ${esc(r.support_section.differentiator)}</span></div>`;
    
  (r.support_section.products || []).forEach(p => {
    let link = "";
    if (p.name.includes("RegPort")) link = "https://regport.regtech365.com/";
    if (p.name.includes("RegGuard")) link = "https://regguard-client-production.gentlemushroom-84487ebc.eastus.azurecontainerapps.io";
    if (p.name.includes("RegComply")) link = "https://www.regtech365.com/";

    h += `
    <div class="regtech-product-card">
      <div class="regtech-product-header">
        <div class="product-icon">${esc(p.name.substring(0,2).toUpperCase())}</div>
        <div>
          <div class="product-name">${link ? `<a href="${link}" target="_blank">${esc(p.name)}</a>` : esc(p.name)}</div>
          <div class="product-tagline">${esc(p.tagline)}</div>
        </div>
      </div>
      <div class="regtech-product-body">
        <div style="margin-bottom:12px">${(p.gaps_closed || []).map(g => `<span class="gap-closed-tag">${esc(g)}</span>`).join('')}</div>
        <p class="product-desc">${esc(p.description)}</p>
      </div>
    </div>`;
  });

  h += `
    <h3 style="font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--navy); margin:28px 0 16px;">OPEX Consulting Advisory Services</h3>
    <div class="services-grid">
      ${(r.support_section.advisory_services || []).map(s => `
        <div class="service-item">
          <div style="width:6px; height:6px; background:var(--gold); border-radius:50%; margin-top:8px; flex-shrink:0;"></div>
          <div class="service-text"><strong>${esc(s.title)}</strong> — ${esc(s.description)}</div>
        </div>
      `).join('')}
    </div>

    <div class="cta-box">
      <h2 class="cta-title">${esc(r.support_section.cta.title)}</h2>
      <p class="cta-subtitle">${esc(r.support_section.cta.subtitle)}</p>
      <div class="cta-buttons">
        <a href="mailto:business@regtech365.com?subject=CBN AML Gap Assessment Query - ${encodeURIComponent(r.meta.inst_name)}" class="btn-primary">${esc(r.support_section.cta.primary_button_label)}</a>
        <a href="mailto:business@regtech365.com?subject=CBN AML Advisory Inquiry - ${encodeURIComponent(r.meta.inst_name)}" class="btn-secondary">${esc(r.support_section.cta.secondary_button_label)}</a>
      </div>
    </div>
    
  </div>`;

  container.innerHTML = h;
}

window.addEventListener('load', () => {
    if (typeof DEMO_REPORT !== 'undefined') {
        render(DEMO_REPORT);
    }
});
</script>
</body>
</html>
